<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>无限流 · 状态栏</title>
<style>
:root{--bg:rgba(10,10,20,0.92);--surface:rgba(18,18,36,0.9);--border:rgba(100,140,255,0.12);--text:#c4ccde;--text-dim:#5e6680;--accent:#5b8def;--gold:#e2b04a;--danger:#e05555;--success:#5bbf6b;--hp:#e05555;--mp:#5b8def;--sp:#e2b04a;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:transparent;color:var(--text);font-size:0.8rem;line-height:1.5;max-height:600px;overflow-y:auto;overflow-x:hidden;padding:8px 10px;scrollbar-width:thin;scrollbar-color:rgba(100,140,255,0.15) transparent}
body::-webkit-scrollbar{width:3px}
body::-webkit-scrollbar-thumb{background:rgba(100,140,255,0.15);border-radius:2px}
.status-main{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;backdrop-filter:blur(10px);max-width:100%}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.header-left h2{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#8bb5ff,#c8a0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.header-left .world-tag{font-size:0.7rem;color:var(--text-dim);margin-top:1px}
.header-right{text-align:right;font-size:0.7rem;color:var(--text-dim)}
.bars-section{margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bar-label{width:28px;font-size:0.7rem;font-weight:700;text-align:right}
.bar-label.hp{color:var(--hp)}.bar-label.mp{color:var(--mp)}.bar-label.sp{color:var(--sp)}
.bar-track{flex:1;height:7px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.bar-fill.hp{background:linear-gradient(90deg,#c0392b,#e05555)}.bar-fill.mp{background:linear-gradient(90deg,#2b6cb0,#5b8def)}.bar-fill.sp{background:linear-gradient(90deg,#b8860b,#e2b04a)}
.bar-val{font-size:0.7rem;color:var(--text-dim);width:60px;text-align:right;white-space:nowrap}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px}
.stat-cell{text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 3px}
.stat-cell .sv{font-size:0.9rem;font-weight:700;color:var(--gold)}
.stat-cell .sn{font-size:0.65rem;color:var(--text-dim)}
.info-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02);font-size:0.75rem}
.info-row .ik{color:var(--text-dim);flex-shrink:0;margin-right:8px}
.info-row .iv{text-align:right;word-break:break-all}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:0.68rem;margin:1px 2px}
.badge.gold{background:rgba(226,176,74,0.12);color:var(--gold)}
.badge.epic{background:rgba(162,100,255,0.12);color:#a264ff}
.badge.rare{background:rgba(91,141,239,0.12);color:var(--accent)}
.badge.danger{background:rgba(224,85,85,0.12);color:var(--danger)}
summary{cursor:pointer;font-size:0.82rem;font-weight:700;color:#8bb5ff;padding:5px 0;outline:none;user-select:none;display:flex;align-items:center;gap:4px}
summary:hover{color:#a0cbff}
details{margin-bottom:4px}
details[open] summary{margin-bottom:4px}
.npc-table,.quest-table,.mem-table{width:100%;border-collapse:collapse;font-size:0.72rem}
.npc-table th,.quest-table th,.mem-table th{text-align:left;color:var(--text-dim);font-weight:600;padding:2px 6px;border-bottom:1px solid var(--border);font-size:0.68rem}
.npc-table td,.quest-table td,.mem-table td{padding:3px 6px;border-bottom:1px solid rgba(255,255,255,0.02)}
.rec-list{list-style:none;padding:0;margin:0}
.rec-list li{font-size:0.73rem;padding:2px 0;padding-left:10px;position:relative}
.rec-list li:before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:0.6rem;top:5px}
.empty-text{color:var(--text-dim);font-size:0.73rem;font-style:italic}
.injury-badge{padding:2px 6px;border-radius:3px;font-size:0.7rem}
.injury-badge.none{color:var(--success)}
.injury-badge.light{color:var(--gold)}
.injury-badge.severe{color:var(--danger)}
.reload-bar{text-align:center;font-size:0.65rem;color:var(--text-dim);margin-top:4px}
</style></head><body>
<div class="status-main" id="statusRoot">
<div style="text-align:center;color:var(--text-dim);padding:30px">⏳ 等待数据加载…</div>
</div>
<script>
function get(d,path,def){
  var keys=path.split('.'),r=d;
  for(var i=0;i<keys.length;i++){if(r==null||typeof r!=='object')return def;r=r[keys[i]]}
  return r!=null?r:def;
}
function fmt(v,def){return v||v===0?String(v):(def||'—')}

function render(data){
  if(!data||!data.主角){document.getElementById('statusRoot').innerHTML='<div style="text-align:center;color:var(--text-dim);padding:30px">⏳ 等待数据加载…</div>';return}
  var w=data.世界||{},p=data.主角||{},bi=p.基础信息||{},at=p.属性||{},st=p.状态||{},cl=p.穿着||{},tm=data.队友||[],nv=data.当前环境NPC||{},qt=data.当前任务||{},mem=data.记忆库||{},rec=data.行动推荐||[],sw=data.系统开关||{};
  var talents=p.天赋||{},skills=p.技能||{},items=p.物品栏||{};
  var hp=st.生命值||0,hpm=st.生命值上限||100,mp=st.法力值||0,mpm=st.法力值上限||1,sp=st.体力值||0,spm=st.体力值上限||1;
  var h='';

  h+='<div class="header-row"><div class="header-left"><h2>⚡ '+fmt(get(p,'基础信息.姓名'),'适格者')+'</h2><div class="world-tag">🌍 '+fmt(w.当前世界)+' · '+fmt(w.当前世界类型)+'</div></div><div class="header-right">🕐 '+fmt(w.当前时间)+'<br>📍 '+fmt(w.当前地点)+'<br>🌤 '+fmt(w.天气,'—')+'</div></div>';

  h+='<div class="bars-section">';
  h+='<div class="bar-row"><span class="bar-label hp">HP</span><div class="bar-track"><div class="bar-fill hp" style="width:'+(hpm?hp/hpm*100:0)+'%"></div></div><span class="bar-val">'+hp+' / '+hpm+'</span></div>';
  h+='<div class="bar-row"><span class="bar-label mp">MP</span><div class="bar-track"><div class="bar-fill mp" style="width:'+(mpm?mp/mpm*100:0)+'%"></div></div><span class="bar-val">'+mp+' / '+mpm+'</span></div>';
  h+='<div class="bar-row"><span class="bar-label sp">SP</span><div class="bar-track"><div class="bar-fill sp" style="width:'+(spm?sp/spm*100:0)+'%"></div></div><span class="bar-val">'+sp+' / '+spm+'</span></div>';
  h+='</div>';

  var inj=st.伤势描述;h+='<div class="info-row"><span class="ik">伤势</span><span class="iv"><span class="injury-badge '+(inj&&inj!=='无'?(inj.includes('重')||inj.includes('骨')?'severe':'light'):'none')+'">'+fmt(inj,'无')+'</span></span></div>';

  h+='<div class="stat-grid">';
  ['力量','敏捷','体质','精神','智力','魅力'].forEach(function(s){h+='<div class="stat-cell"><div class="sv">'+fmt(at[s])+'</div><div class="sn">'+s+'</div></div>'});
  h+='</div>';
  h+='<div class="info-row"><span class="ik">剩余属性点</span><span class="iv">'+fmt(at.剩余属性点,'0')+'</span></div>';

  h+='<details><summary>👤 主角信息</summary>';
  h+='<div class="info-row"><span class="ik">年龄</span><span class="iv">'+fmt(bi.年龄)+' · '+fmt(bi.性别)+'</span></div>';
  h+='<div class="info-row"><span class="ik">外貌</span><span class="iv">'+fmt(bi.外貌)+'</span></div>';
  if(bi.性格行为模式)h+='<div class="info-row"><span class="ik">性格</span><span class="iv">'+fmt(bi.性格行为模式)+'</span></div>';
  h+='<div class="info-row"><span class="ik">穿着</span><span class="iv">'+fmt(cl.整体描述)+'</span></div>';
  h+='<div class="info-row"><span class="ik">积分</span><span class="iv">'+(sw.积分系统?fmt(p.积分,'0'):'已关闭')+'</span></div>';
  h+='</details>';

  h+='<details><summary>⭐ 天赋 ('+Object.keys(talents).length+')</summary>';
  if(Object.keys(talents).length){
    Object.keys(talents).forEach(function(t){
      var td=talents[t];var cls=td.等级==='传说'?'gold':(td.等级==='史诗'?'epic':(td.等级==='稀有'?'rare':''));
      h+='<div class="info-row"><span class="ik"><span class="badge '+(cls||'')+'">'+fmt(td.等级)+'</span> '+t+'</span><span class="iv" style="font-size:0.72rem">'+fmt(td.描述)+'</span></div>';
    });
  }else{h+='<div class="empty-text">无</div>'}
  h+='</details>';

  h+='<details><summary>⚔ 技能 ('+Object.keys(skills).length+')</summary>';
  if(Object.keys(skills).length){
    Object.keys(skills).forEach(function(s){
      var sk=skills[s];h+='<div class="info-row"><span class="ik">'+s+' <span class="badge">'+fmt(sk.类型)+'</span> '+fmt(sk.熟练度)+'</span><span class="iv" style="font-size:0.72rem">'+fmt(sk.描述)+(sk.冷却回合?' CD:'+fmt(sk.剩余冷却)+'/'+sk.冷却回合:'')+'</span></div>';
    });
  }else{h+='<div class="empty-text">无</div>'}
  h+='</details>';

  h+='<details><summary>🎒 物品 ('+Object.keys(items).length+')</summary>';
  if(Object.keys(items).length){
    Object.keys(items).forEach(function(i){
      var it=items[i];h+='<div class="info-row"><span class="ik">'+i+' <span class="badge">'+fmt(it.品质)+'</span> ×'+fmt(it.数量)+'</span><span class="iv" style="font-size:0.72rem">'+fmt(it.描述)+'</span></div>';
    });
  }else{h+='<div class="empty-text">无</div>'}
  h+='</details>';

  h+='<details open><summary>👥 队友 ('+tm.length+')</summary>';
  if(tm.length){
    h+='<table class="npc-table"><tr><th>名字</th><th>身份</th><th>好感</th><th>态度</th><th>状态</th></tr>';
    tm.forEach(function(t){h+='<tr><td>'+fmt(t.名字)+'</td><td>'+fmt(t.身份)+'</td><td>'+fmt(t.好感度,'0')+'</td><td>'+fmt(t.态度)+'</td><td>'+fmt(t.状态)+'</td></tr>'});
    h+='</table>';
  }else{h+='<div class="empty-text">无</div>'}
  h+='</details>';

  h+='<details><summary>🏘 当前环境NPC ('+Object.keys(nv).length+')</summary>';
  if(Object.keys(nv).length){
    h+='<table class="npc-table"><tr><th>名字</th><th>身份</th><th>关系</th><th>态度</th><th>状态</th></tr>';
    Object.keys(nv).forEach(function(k){var n=nv[k];h+='<tr><td>'+k+'</td><td>'+fmt(n.身份)+'</td><td>'+fmt(n.关系)+'</td><td>'+fmt(n.态度)+'</td><td>'+fmt(n.状态)+'</td></tr>'});
    h+='</table>';
  }else{h+='<div class="empty-text">无</div>'}
  h+='</details>';

  h+='<details><summary>📋 当前任务</summary>';
  h+='<div class="info-row"><span class="ik">主线</span><span class="iv">'+fmt(qt.主线,'无')+(qt.主线&&qt.主线总节点?' (节点'+fmt(qt.主线节点,'0')+'/'+qt.主线总节点+')':'')+'</span></div>';
  var sq=qt.支线||{};if(Object.keys(sq).length){
    Object.keys(sq).forEach(function(q){var qd=sq[q];h+='<div class="info-row"><span class="ik">'+q+' <span class="badge '+(qd.状态==='已完成'?'':'danger')+'">'+fmt(qd.状态)+'</span></span><span class="iv" style="font-size:0.72rem">'+fmt(qd.描述)+'</span></div>'});
  }
  h+='</details>';

  h+='<details><summary>📖 记忆库 ('+Object.keys(mem).length+'个世界)</summary>';
  if(Object.keys(mem).length){
    h+='<table class="mem-table"><tr><th>世界</th><th>状态</th><th>关键事件</th></tr>';
    Object.keys(mem).slice(-5).forEach(function(k){var m=mem[k],ev=m.关键事件||[];h+='<tr><td>'+k+'</td><td>'+fmt(m.通关状态)+'</td><td>'+ev.length+'件</td></tr>'});
    h+='</table>';
  }else{h+='<div class="empty-text">尚未经历任何世界</div>'}
  h+='</details>';

  if(rec&&rec.length){
    h+='<details open><summary>💡 行动推荐</summary><ul class="rec-list">';
    rec.forEach(function(r){h+='<li>'+r+'</li>'});
    h+='</ul></details>';
  }

  h+='<div class="reload-bar">自动刷新中 · 数据源: MVU stat_data</div>';
  document.getElementById('statusRoot').innerHTML=h;
}

function readData(){
  try{
    var gv=window.getVariables;var mv=window.Mvu;
    var raw=gv?gv({type:'message'}):null;
    if(raw&&raw.stat_data&&typeof raw.stat_data==='object'&&raw.stat_data.主角)return raw.stat_data;
    if(mv&&mv.getMvuData){
      var d=mv.getMvuData({type:'message',message_id:-1});
      if(d&&d.stat_data&&typeof d.stat_data==='object'&&d.stat_data.主角)return d.stat_data;
    }
    var all=window.getAllVariables?window.getAllVariables():null;
    if(all&&all.stat_data&&typeof all.stat_data==='object'&&all.stat_data.主角)return all.stat_data;
  }catch(e){console.error('[状态栏]读取数据失败',e)}
  return null;
}

function refresh(){
  var d=readData();
  if(d)render(d);
}

refresh();

try{
  var mv=window.Mvu;
  if(mv&&mv.events&&mv.events.VARIABLE_UPDATE_ENDED&&typeof window.eventOn==='function'){
    window.eventOn(mv.events.VARIABLE_UPDATE_ENDED,refresh);
  }
}catch(e){}

setInterval(refresh,2000);
</script></body></html>
