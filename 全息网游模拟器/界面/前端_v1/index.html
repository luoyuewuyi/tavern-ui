<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全息网游模拟器</title>
<style>
/* 全息网游模拟器 · 大前端卡样式
   主题：赛博全息 · 深色霓虹 · 玻璃拟态 · 响应式
   字体：Noto Sans SC / Orbitron / JetBrains Mono
*/
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg-void: #0a0a14;
  --bg-panel: rgba(18, 16, 38, 0.78);
  --bg-card: rgba(28, 24, 56, 0.65);
  --neon-cyan: #4de8ff;
  --neon-purple: #a06bff;
  --neon-pink: #ff5cc8;
  --neon-gold: #ffcf5c;
  --text-main: #e6e8ff;
  --text-dim: #9aa0c8;
  --text-muted: #6b7090;
  --border-glow: rgba(77, 232, 255, 0.25);
  --border-soft: rgba(160, 107, 255, 0.2);
  --grad-holo: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-void);
  color: var(--text-main);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: -2;
  background:
    radial-gradient(circle at 15% 20%, rgba(77, 232, 255, 0.12), transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(160, 107, 255, 0.14), transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(255, 92, 200, 0.06), transparent 50%);
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(77,232,255,0.02) 0, rgba(77,232,255,0.02) 1px, transparent 1px, transparent 3px);
  animation: scan 8s linear infinite;
}
@keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(3px); } }

/* ===== 开局表单 ===== */
.opening-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
}
.opening-card {
  width: 100%; max-width: 640px;
  background: var(--bg-panel); backdrop-filter: blur(18px);
  border: 1px solid var(--border-glow); border-radius: 18px;
  box-shadow: 0 0 40px rgba(77, 232, 255, 0.15), inset 0 0 20px rgba(160, 107, 255, 0.08);
  padding: 32px 28px; position: relative; overflow: hidden;
  animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.opening-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--grad-holo); box-shadow: 0 0 12px var(--neon-cyan);
}
.opening-logo {
  font-family: 'Orbitron', sans-serif; font-size: 1.7rem; font-weight: 700;
  text-align: center; background: var(--grad-holo); -webkit-background-clip: text;
  background-clip: text; color: transparent; letter-spacing: 3px;
  filter: drop-shadow(0 0 8px rgba(77, 232, 255, 0.4));
}
.opening-sub { text-align: center; color: var(--text-dim); font-size: 0.85rem; margin: 6px 0 24px; letter-spacing: 2px; }
.form-section { margin-bottom: 22px; padding: 16px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-soft); }
.section-title { font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); font-size: 0.95rem; margin-bottom: 14px; letter-spacing: 1px; }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; color: var(--text-dim); font-size: 0.82rem; margin-bottom: 7px; }
.field input[type=text], .field input[type=number] {
  width: 100%; padding: 10px 12px; background: rgba(10, 8, 24, 0.7);
  border: 1px solid var(--border-soft); border-radius: 8px; color: var(--text-main);
  font-family: inherit; font-size: 0.9rem; transition: all 0.2s;
}
.field input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(77, 232, 255, 0.25); }
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
.opt-btn {
  padding: 7px 14px; background: rgba(10, 8, 24, 0.6); border: 1px solid var(--border-soft);
  border-radius: 20px; color: var(--text-dim); cursor: pointer; font-size: 0.82rem;
  font-family: inherit; transition: all 0.2s;
}
.opt-btn:hover { border-color: var(--neon-purple); color: var(--text-main); }
.opt-btn.selected {
  background: linear-gradient(135deg, rgba(77,232,255,0.2), rgba(160,107,255,0.2));
  border-color: var(--neon-cyan); color: var(--neon-cyan);
  box-shadow: 0 0 12px rgba(77, 232, 255, 0.3);
}
.submit-row { display: flex; gap: 12px; margin-top: 8px; }
.submit-btn {
  flex: 1; padding: 13px; background: var(--grad-holo); border: none; border-radius: 10px;
  color: #0a0a14; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px; transition: all 0.25s; box-shadow: 0 0 20px rgba(77, 232, 255, 0.3);
}
.submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 28px rgba(160, 107, 255, 0.5); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.random-btn {
  padding: 13px 20px; background: rgba(10, 8, 24, 0.7); border: 1px solid var(--border-soft);
  border-radius: 10px; color: var(--text-dim); cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.random-btn:hover { border-color: var(--neon-gold); color: var(--neon-gold); }
.opening-status { margin-top: 14px; text-align: center; color: var(--text-dim); font-size: 0.85rem; min-height: 20px; }
.opening-status.err { color: var(--neon-pink); }

/* ===== 游戏主界面 ===== */
.game-wrap { position: relative; min-height: 100vh; padding: 14px; }
.fullscreen-btn {
  position: fixed; top: 14px; right: 14px; z-index: 50;
  width: 38px; height: 38px; border-radius: 9px; cursor: pointer;
  background: var(--bg-panel); border: 1px solid var(--border-glow);
  color: var(--neon-cyan); font-size: 1.1rem; backdrop-filter: blur(10px);
  transition: all 0.2s;
}
.fullscreen-btn:hover { box-shadow: 0 0 14px rgba(77, 232, 255, 0.4); transform: scale(1.08); }
.game-layout { display: flex; gap: 14px; max-width: 1400px; margin: 0 auto; }
.game-main {
  flex: 1; min-width: 0; background: var(--bg-panel); backdrop-filter: blur(16px);
  border: 1px solid var(--border-glow); border-radius: 14px; padding: 18px;
  display: flex; flex-direction: column; min-height: calc(100vh - 28px);
}
.game-header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; margin-bottom: 14px; border-bottom: 1px solid var(--border-soft);
}
.game-title { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; color: var(--neon-cyan); letter-spacing: 1px; filter: drop-shadow(0 0 6px rgba(77,232,255,0.3)); }
.turn-info { font-size: 0.8rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.story-area {
  flex: 1; overflow-y: auto; padding: 14px 16px; margin-bottom: 14px;
  background: rgba(10, 8, 24, 0.4); border-radius: 10px; border: 1px solid var(--border-soft);
  line-height: 1.85; font-size: 0.95rem; min-height: 200px;
}
.maintext { color: var(--text-main); animation: fadeIn 0.4s ease; user-select: text; cursor: pointer; }
.maintext.streaming { color: var(--text-dim); font-style: italic; }
.loading { color: var(--text-muted); text-align: center; padding: 30px; font-size: 0.85rem; }
.options-area { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
.option-btn {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 10px;
  color: var(--text-main); cursor: pointer; font-family: inherit; font-size: 0.9rem;
  text-align: left; transition: all 0.2s; animation: slideInUp 0.35s ease backwards;
}
.option-btn:nth-child(2) { animation-delay: 0.05s; }
.option-btn:nth-child(3) { animation-delay: 0.1s; }
.option-btn:nth-child(4) { animation-delay: 0.15s; }
.option-btn:hover:not(.disabled) {
  border-color: var(--neon-purple); background: rgba(160, 107, 255, 0.12);
  transform: translateX(4px); box-shadow: 0 0 14px rgba(160, 107, 255, 0.2);
}
.option-btn.disabled { opacity: 0.4; cursor: not-allowed; }
.opt-id {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
  background: var(--grad-holo); color: #0a0a14; font-weight: 700;
  display: flex; align-items: center; justify-content: center; font-size: 0.82rem;
  font-family: 'Orbitron', sans-serif;
}
.opt-text { flex: 1; }
.generating { display: flex; align-items: center; gap: 6px; color: var(--neon-cyan); font-size: 0.85rem; margin-bottom: 12px; padding: 0 4px; }
.gen-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon-cyan); animation: pulse 1.2s infinite; }
.gen-dot:nth-child(2) { animation-delay: 0.2s; }
.gen-dot:nth-child(3) { animation-delay: 0.4s; }
.input-area { display: flex; gap: 10px; }
.input-area input {
  flex: 1; padding: 11px 14px; background: rgba(10, 8, 24, 0.7);
  border: 1px solid var(--border-soft); border-radius: 9px; color: var(--text-main);
  font-family: inherit; font-size: 0.9rem;
}
.input-area input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(77,232,255,0.25); }
.send-btn {
  padding: 11px 22px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  border: none; border-radius: 9px; color: #0a0a14; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.send-btn:hover { box-shadow: 0 0 14px rgba(77, 232, 255, 0.4); }

/* ===== 状态栏侧栏 ===== */
.status-sidebar {
  width: 320px; flex-shrink: 0; background: var(--bg-panel); backdrop-filter: blur(16px);
  border: 1px solid var(--border-glow); border-radius: 14px; padding: 14px;
  overflow-y: auto; max-height: calc(100vh - 28px);
}
.sidebar-loading { color: var(--text-muted); text-align: center; padding: 30px; font-size: 0.85rem; }
.sb-section { margin-bottom: 16px; padding: 12px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-soft); }
.sb-section:last-child { margin-bottom: 0; }
.sb-title {
  font-family: 'Orbitron', sans-serif; font-size: 0.82rem; color: var(--neon-purple);
  margin-bottom: 10px; letter-spacing: 1px; padding-bottom: 6px; border-bottom: 1px solid var(--border-soft);
  filter: drop-shadow(0 0 4px rgba(160,107,255,0.3));
}
.sb-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; padding: 4px 0; font-size: 0.82rem; }
.sb-row span { color: var(--text-muted); flex-shrink: 0; }
.sb-row b { color: var(--text-main); text-align: right; font-weight: 500; word-break: break-all; }
.sb-row b.mood { color: var(--neon-pink); font-style: italic; }
.love-bar { height: 5px; background: rgba(10, 8, 24, 0.6); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.love-bar.small { height: 4px; }
.love-fill { height: 100%; background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple)); transition: width 0.5s ease; box-shadow: 0 0 6px rgba(255, 92, 200, 0.4); }
.npc-card { padding: 9px; background: rgba(10, 8, 24, 0.5); border-radius: 8px; margin-top: 8px; border: 1px solid var(--border-soft); }
.npc-head { display: flex; justify-content: space-between; align-items: center; }
.npc-head b { color: var(--neon-gold); font-size: 0.85rem; }
.npc-head span { color: var(--text-muted); font-size: 0.72rem; }
.npc-sub { color: var(--text-dim); font-size: 0.75rem; margin: 3px 0; }
.npc-love { color: var(--neon-pink); font-size: 0.78rem; margin-bottom: 4px; }

/* ===== 动画 ===== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

/* ===== 滚动条 ===== */
.story-area::-webkit-scrollbar, .status-sidebar::-webkit-scrollbar { width: 6px; }
.story-area::-webkit-scrollbar-thumb, .status-sidebar::-webkit-scrollbar-thumb { background: rgba(77, 232, 255, 0.3); border-radius: 3px; }
.story-area::-webkit-scrollbar-thumb:hover, .status-sidebar::-webkit-scrollbar-thumb:hover { background: rgba(77, 232, 255, 0.5); }

/* ===== 响应式 ===== */
@media (max-width: 900px) {
  .game-layout { flex-direction: column; }
  .status-sidebar { width: 100%; max-height: none; order: 2; }
  .game-main { min-height: 60vh; order: 1; }
}
@media (max-width: 560px) {
  .opening-card { padding: 22px 16px; }
  .opening-logo { font-size: 1.3rem; }
  .game-wrap { padding: 8px; }
  .game-main, .status-sidebar { padding: 12px; }
  .opt-btn { font-size: 0.78rem; padding: 6px 11px; }
  .option-btn { padding: 10px 12px; font-size: 0.85rem; }
  .fullscreen-btn { width: 34px; height: 34px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
(() => {
  // src/全息网游模拟器/utils/gameInitializer.ts
  var isInitializing = false;
  function buildInitialStat(form) {
    return {
      \u4E16\u754C: { \u5F53\u524D\u65F6\u95F4: "2026\u5E746\u670820\u65E5 \xB7 \u5468\u516D \xB7 \u5348\u540E", \u5F53\u524D\u5730\u70B9: "\u73B0\u5B9E\xB7\u5367\u5BA4", \u7B2C\u51E0\u56DE\u5408: 1, \u56DE\u5408\u7C7B\u578B: "\u4E8B\u4EF6\u56DE\u5408", \u5DF2\u8F93\u51FA\u6B21\u6570: 0 },
      \u4E3B\u63A7: {
        \u73B0\u5B9E\u59D3\u540D: form.\u73B0\u5B9E\u59D3\u540D,
        \u73B0\u5B9E\u8EAB\u4EFD: form.\u73B0\u5B9E\u8EAB\u4EFD,
        \u73B0\u5B9E\u8D44\u91D1: 500,
        \u6027\u522B: form.\u6027\u522B,
        \u6027\u53D6\u5411: form.\u6027\u53D6\u5411,
        \u4E0A\u4E0B\u4F4D: form.\u4E0A\u4E0B\u4F4D,
        \u5E74\u9F84: form.\u5E74\u9F84,
        \u5FC3\u60C5: "\u6234\u4E0A\u5168\u606F\u8231\uFF0C\u51C6\u5907\u8FDB\u5165\u300A" + form.\u6E38\u620F\u540D\u79F0 + "\u300B\u7684\u4E16\u754C"
      },
      \u5F53\u524D\u89D2\u8272: {
        \u7F51\u540D: form.\u7F51\u540D,
        \u7B49\u7EA7: 1,
        \u804C\u4E1A: form.\u804C\u4E1A,
        \u5E2E\u4F1A: "\u72EC\u884C",
        \u4E2A\u6027\u7B7E\u540D: form.\u4E2A\u6027\u7B7E\u540D,
        \u79F0\u53F7: "\u840C\u65B0\u73A9\u5BB6",
        \u6218\u529B\u8BC4\u5206: 100,
        PVP\u6BB5\u4F4D: "\u65E0",
        \u6E38\u620F\u5E01: 1e3,
        \u5145\u503C\u5E01: 0,
        \u88C5\u5907: "\u65B0\u624B\u5E03\u8863",
        \u65F6\u88C5: "\u65E0",
        \u662F\u5426\u5728\u7EBF: true
      },
      \u793E\u4EA4: { \u597D\u53CB\u6570: 0, \u5E08\u5F92: "\u65E0", \u7ED3\u4E49: "\u65E0", \u60C5\u7F18: "\u65E0" },
      \u5F53\u524D\u4E92\u52A8: { \u89D2\u8272\u540D: "\u65E0", \u597D\u611F\u5EA6: 0, \u597D\u611F\u9636\u6BB5: "\u65E0" },
      \u53EF\u653B\u7565\u89D2\u8272: [],
      \u6E38\u620F\u9898\u6750: form.\u6E38\u620F\u9898\u6750,
      \u6E38\u620F\u540D\u79F0: form.\u6E38\u620F\u540D\u79F0
    };
  }
  async function initializeGameVariables(form) {
    console.log("\u{1F3AE} [gameInitializer] \u521D\u59CB\u5316\u53D8\u91CF, \u8868\u5355=", form);
    try {
      await waitGlobalInitialized("Mvu");
      const stat = buildInitialStat(form);
      updateVariablesWith((v) => {
        const nv = { ...v };
        nv.stat_data = stat;
        return nv;
      }, { type: "message", message_id: 0 });
      console.log("\u2705 [gameInitializer] 0\u5C42\u53D8\u91CF\u5DF2\u5199\u5165");
      return true;
    } catch (e) {
      console.error("\u274C [gameInitializer] \u521D\u59CB\u5316\u5931\u8D25:", e);
      return false;
    }
  }
  async function createOpeningStoryMessage(form) {
    if (isInitializing) {
      console.warn("\u26A0\uFE0F [gameInitializer] \u6B63\u5728\u521D\u59CB\u5316\uFF0C\u8DF3\u8FC7\u91CD\u590D\u8C03\u7528");
      return false;
    }
    isInitializing = true;
    try {
      const lastId = getLastMessageId();
      if (lastId > 0) {
        const existing = getChatMessages(1);
        if (existing && existing.length > 0 && existing[0].message) {
          console.log("\u2139\uFE0F [gameInitializer] 1\u5C42\u5DF2\u5B58\u5728\uFF0C\u8DF3\u8FC7\u521B\u5EFA");
          return true;
        }
      }
      const openingText = buildOpeningNarrative(form);
      const mvuData = { stat_data: buildInitialStat(form) };
      await createChatMessages([{
        role: "assistant",
        message: openingText,
        data: mvuData,
        name: "\u300A" + form.\u6E38\u620F\u540D\u79F0 + "\u300B"
      }], { insert_before: "end", refresh: "none" });
      console.log("\u2705 [gameInitializer] \u5F00\u5C40\u6D88\u606F\u5DF2\u521B\u5EFA");
      return true;
    } catch (e) {
      console.error("\u274C [gameInitializer] \u521B\u5EFA\u5F00\u5C40\u6D88\u606F\u5931\u8D25:", e);
      return false;
    } finally {
      setTimeout(() => {
        isInitializing = false;
      }, 2e3);
    }
  }
  function buildOpeningNarrative(form) {
    const topic = form.\u6E38\u620F\u9898\u6750;
    const gameName = form.\u6E38\u620F\u540D\u79F0;
    return `<maintext>\u300A${gameName}\u300B\u2014\u2014\u4E00\u6B3E${topic}\u9898\u6750\u7684\u5168\u606FMMORPG\uFF0C\u516C\u6D4B\u9996\u65E5\u3002

\u5168\u606F\u8231\u7F13\u7F13\u5408\u4E0A\uFF0C\u4E94\u611F\u88AB\u4E00\u70B9\u70B9\u63A5\u5165\u865A\u62DF\u4E16\u754C\u3002\u4F60\u7741\u5F00\u773C\uFF0C\u773C\u524D\u662F\u65B0\u624B\u6307\u5F15\u7684\u6D6E\u7A7A\u5E7F\u573A\uFF0C${topic === "\u897F\u5E7B" ? "\u54E5\u7279\u5F0F\u5C16\u5854\u4E0E\u9B54\u6CD5\u7B26\u6587\u5728\u4E91\u7AEF\u6D41\u8F6C" : topic === "\u6B66\u4FA0" ? "\u9752\u74E6\u98DE\u6A90\u4E0E\u6C5F\u6E56\u64C2\u53F0\u5728\u4E91\u96FE\u4E2D\u9690\u73B0" : topic === "\u672B\u4E16" ? "\u5E9F\u589F\u9713\u8679\u4E0E\u751F\u9508\u673A\u7532\u5728\u7070\u96FE\u91CC\u95EA\u70C1" : "\u661F\u8230\u7A79\u9876\u4E0E\u5168\u606F\u5E7F\u544A\u5728\u865A\u7A7A\u4E2D\u94FA\u5C55"}\u3002\u7CFB\u7EDF\u63D0\u793A\u5728\u8033\u8FB9\u54CD\u8D77\u2014\u2014

  function parseOptions(messageContent) {

      statusEl.classList.remove("err");
      const ok1 = await initializeGameVariables(data);
      const ok2 = await createOpeningStoryMessage(data);
      if (ok1 && ok2) {
        statusEl.textContent = "\u2705 \u8FDB\u5165\u6E38\u620F\u4E2D...";
        setTimeout(() => initGameScreen(root), 800);
      } else {
        statusEl.textContent = "\u274C \u521D\u59CB\u5316\u5931\u8D25\uFF0C\u8BF7\u91CD\u8BD5";
        statusEl.classList.add("err");
        submitBtn.removeAttribute("disabled");
        submitBtn.textContent = "\u27E1 \u8FDB\u5165\u6E38\u620F \u27E1";
      }
    });
  }
  function collectForm(root, selected) {
    const get = (id) => (root.querySelector("#" + id)?.value || "").trim();
    let \u6027\u522B = selected["\u6027\u522B"] || "";
    let \u6027\u53D6\u5411 = selected["\u6027\u53D6\u5411"] || "";
    let \u4E0A\u4E0B\u4F4D = selected["\u4E0A\u4E0B\u4F4D"] || "";
    let \u6E38\u620F\u9898\u6750 = selected["\u6E38\u620F\u9898\u6750"] || "";
    return {
      \u6027\u522B,
      \u6027\u53D6\u5411,
      \u4E0A\u4E0B\u4F4D,
      \u73B0\u5B9E\u59D3\u540D: get("f-name"),
      \u5E74\u9F84: parseInt(get("f-age")) || 16 + Math.floor(Math.random() * 12),
      \u73B0\u5B9E\u8EAB\u4EFD: get("f-identity"),
      \u6E38\u620F\u9898\u6750,
      \u6E38\u620F\u540D\u79F0: get("f-game"),
      \u7F51\u540D: get("f-netname"),
      \u804C\u4E1A: get("f-job"),
      \u4E2A\u6027\u7B7E\u540D: get("f-sig")
    };
  }
  var RANDOM_NAMES = ["\u6C88\u781A", "\u9646\u77E5\u590F", "\u987E\u5DDD", "\u6797\u662D", "\u82CF\u5C7F", "\u6C5F\u5E8F", "\u6E29\u91CE", "\u7941\u7720"];
  var RANDOM_GAMES = ["\u661F\u9668\u7EAA\u5143", "\u4E5D\u9704", "\u5E9F\u571F\u9ECE\u660E", "\u5E7B\u754COnline", "\u6CA7\u6E9F\u5F55"];
  var RANDOM_JOBS = ["\u5251\u58EB", "\u6CD5\u5E08", "\u523A\u5BA2", "\u5F13\u624B", "\u6CBB\u7597\u8005", "\u53EC\u5524\u5E08"];
  var RANDOM_SIGS = ["\u4ECA\u5929\u4E5F\u662F\u60F3\u9000\u4F11\u7684\u4E00\u5929", "\u809D\u5E1D\u672C\u5E1D", "\u4E0D\u7EC4\u961F\uFF0C\u52FF\u6270", "\u5728\uFF1F\u770B\u770B\u4F60\u7684\u88C5\u5907", "\u4F5B\u7CFB\u73A9\u5BB6\uFF0C\u968F\u7F18\u7EC4\u672C"];
  function randomFill(root, selected) {
    const set = (id, v) => {
      const el = root.querySelector("#" + id);
      if (el) el.value = v;
    };
    const pickGroup = (name, val) => {
      selected[name] = val;
      root.querySelectorAll(`.btn-group[data-name="${name}"] .opt-btn`).forEach((b) => {
        b.classList.toggle("selected", b.dataset.val === val);
      });
    };
    pickGroup("\u6027\u522B", Math.random() > 0.5 ? "\u7537" : "\u5973");
    pickGroup("\u6027\u53D6\u5411", ["bl", "gl", "bg", "gb", "\u5168\u80FD\u63A5\u53D7"][Math.floor(Math.random() * 5)]);
    pickGroup("\u4E0A\u4E0B\u4F4D", ["\u4E0A\u4F4D", "\u4E0B\u4F4D", "\u89C6\u60C5\u51B5\u7686\u53EF"][Math.floor(Math.random() * 3)]);
    pickGroup("\u6E38\u620F\u9898\u6750", ["\u897F\u5E7B", "\u6B66\u4FA0", "\u672B\u4E16", "\u79D1\u5E7B"][Math.floor(Math.random() * 4)]);
    set("f-name", RANDOM_NAMES[Math.floor(Math.random() * RANDOM_NAMES.length)]);
    set("f-age", String(16 + Math.floor(Math.random() * 12)));
    set("f-identity", ["\u5927\u4E8C\u5B66\u751F", "\u9AD8\u4E09\u5B66\u751F", "\u4E0A\u73ED\u65CF", "\u81EA\u7531\u804C\u4E1A", "\u5BCC\u4E8C\u4EE3"][Math.floor(Math.random() * 5)]);
    set("f-game", RANDOM_GAMES[Math.floor(Math.random() * RANDOM_GAMES.length)]);
    set("f-netname", "\u73A9\u5BB6" + Math.floor(Math.random() * 9e3 + 1e3));
    set("f-job", RANDOM_JOBS[Math.floor(Math.random() * RANDOM_JOBS.length)]);
    set("f-sig", RANDOM_SIGS[Math.floor(Math.random() * RANDOM_SIGS.length)]);
  }

  // src/全息网游模拟器/index.tsx
  function boot() {
    let stage = "opening";
    try {
      const lastId = getLastMessageId();
      console.log("\u{1F680} [index] lastMessageId =", lastId);
      if (lastId > 0) {
        const m = getChatMessages(1);
        if (m && m.length > 0 && m[0].message) stage = "game";
        else stage = "opening";
      } else {
        stage = "opening";
      }
    } catch (e) {
      console.error("\u274C [index] \u5224\u65AD\u9636\u6BB5\u5931\u8D25", e);
      stage = "opening";
    }
    const root = document.getElementById("app");
    if (!root) {
      console.error("\u65E0 #app \u8282\u70B9");
      return;
    }
    initOpeningForm(root, stage);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();

</script>
