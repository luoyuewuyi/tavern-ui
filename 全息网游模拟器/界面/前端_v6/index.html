<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>全息网游模拟器</title><style>
/* 全息网游模拟器 · 大前端卡样式
   主题：赛博全息 · 深色霓虹 · 玻璃拟态 · 响应式
   字体：Noto Sans SC / Orbitron / JetBrains Mono
*/
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg-void: #0a0a14;
  --bg-panel: rgba(18, 16, 38, 0.78);
  --bg-card: rgba(28, 24, 56, 0.65);
  --neon-cyan: #4de8ff;
  --neon-purple: #a06bff;
  --neon-pink: #ff5cc8;
  --neon-gold: #ffcf5c;
  --text-main: #e6e8ff;
  --text-dim: #9aa0c8;
  --text-muted: #6b7090;
  --border-glow: rgba(77, 232, 255, 0.25);
  --border-soft: rgba(160, 107, 255, 0.2);
  --grad-holo: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
  --story-font-size: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-void);
  color: var(--text-main);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: -2;
  background:
    radial-gradient(circle at 15% 20%, rgba(77, 232, 255, 0.12), transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(160, 107, 255, 0.14), transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(255, 92, 200, 0.06), transparent 50%);
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(77,232,255,0.02) 0, rgba(77,232,255,0.02) 1px, transparent 1px, transparent 3px);
  animation: scan 8s linear infinite;
}
@keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(3px); } }

/* ===== 顶部栏 ===== */
.topbar {
  display: flex; align-items: center; gap: 14px;
  max-width: 1400px; margin: 0 auto 12px;
  padding: 10px 16px; background: var(--bg-panel); backdrop-filter: blur(16px);
  border: 1px solid var(--border-glow); border-radius: 12px;
}
.topbar .game-title { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; color: var(--neon-cyan); letter-spacing: 1px; filter: drop-shadow(0 0 6px rgba(77,232,255,0.3)); flex-shrink: 0; }
.topbar .turn-info { font-size: 0.8rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; flex: 1; }
.topbar-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
  background: rgba(10,8,24,0.6); border: 1px solid var(--border-soft);
  color: var(--text-dim); font-size: 1rem; transition: all 0.2s;
}
.icon-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(77,232,255,0.3); transform: translateY(-1px); }

/* ===== 开局表单 ===== */
.opening-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
}
.opening-card {
  width: 100%; max-width: 640px;
  background: var(--bg-panel); backdrop-filter: blur(18px);
  border: 1px solid var(--border-glow); border-radius: 18px;
  box-shadow: 0 0 40px rgba(77, 232, 255, 0.15), inset 0 0 20px rgba(160, 107, 255, 0.08);
  padding: 32px 28px; position: relative; overflow: hidden;
  animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.opening-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--grad-holo); box-shadow: 0 0 12px var(--neon-cyan);
}
.opening-logo {
  font-family: 'Orbitron', sans-serif; font-size: 1.7rem; font-weight: 700;
  text-align: center; background: var(--grad-holo); -webkit-background-clip: text;
  background-clip: text; color: transparent; letter-spacing: 3px;
  filter: drop-shadow(0 0 8px rgba(77, 232, 255, 0.4));
}
.opening-sub { text-align: center; color: var(--text-dim); font-size: 0.85rem; margin: 6px 0 24px; letter-spacing: 2px; }
.form-section { margin-bottom: 22px; padding: 16px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-soft); }
.section-title { font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); font-size: 0.95rem; margin-bottom: 14px; letter-spacing: 1px; }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; color: var(--text-dim); font-size: 0.82rem; margin-bottom: 7px; }
.field input[type=text], .field input[type=number] {
  width: 100%; padding: 10px 12px; background: rgba(10, 8, 24, 0.7);
  border: 1px solid var(--border-soft); border-radius: 8px; color: var(--text-main);
  font-family: inherit; font-size: 0.9rem; transition: all 0.2s;
}
.field input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(77, 232, 255, 0.25); }
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
.opt-btn {
  padding: 7px 14px; background: rgba(10, 8, 24, 0.6); border: 1px solid var(--border-soft);
  border-radius: 20px; color: var(--text-dim); cursor: pointer; font-size: 0.82rem;
  font-family: inherit; transition: all 0.2s;
}
.opt-btn:hover { border-color: var(--neon-purple); color: var(--text-main); }
.opt-btn.selected {
  background: linear-gradient(135deg, rgba(77,232,255,0.2), rgba(160,107,255,0.2));
  border-color: var(--neon-cyan); color: var(--neon-cyan);
  box-shadow: 0 0 12px rgba(77, 232, 255, 0.3);
}
.submit-row { display: flex; gap: 12px; margin-top: 8px; }
.submit-btn {
  flex: 1; padding: 13px; background: var(--grad-holo); border: none; border-radius: 10px;
  color: #0a0a14; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px; transition: all 0.25s; box-shadow: 0 0 20px rgba(77, 232, 255, 0.3);
}
.submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 28px rgba(160, 107, 255, 0.5); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.random-btn {
  padding: 13px 20px; background: rgba(10, 8, 24, 0.7); border: 1px solid var(--border-soft);
  border-radius: 10px; color: var(--text-dim); cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.random-btn:hover { border-color: var(--neon-gold); color: var(--neon-gold); }
.opening-status { margin-top: 14px; text-align: center; color: var(--text-dim); font-size: 0.85rem; min-height: 20px; }
.opening-status.err { color: var(--neon-pink); }

/* ===== 游戏主界面 ===== */
.game-wrap { position: relative; height: 100vh; display: flex; flex-direction: column; padding: 14px; box-sizing: border-box; overflow: hidden; }
.game-layout { display: flex; gap: 14px; flex: 1; min-height: 0; max-width: 1400px; margin: 0 auto; width: 100%; }
.game-main {
  flex: 1; min-width: 0; background: var(--bg-panel); backdrop-filter: blur(16px);
  border: 1px solid var(--border-glow); border-radius: 14px; padding: 18px;
  display: flex; flex-direction: column; height: 100%; min-height: 0;
}
.game-header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; margin-bottom: 14px; border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.game-title { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; color: var(--neon-cyan); letter-spacing: 1px; filter: drop-shadow(0 0 6px rgba(77,232,255,0.3)); }
.turn-info { font-size: 0.8rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.story-area {
  flex: 1; min-height: 0; overflow-y: auto; padding: 14px 16px; margin-bottom: 14px;
  background: rgba(10, 8, 24, 0.4); border-radius: 10px; border: 1px solid var(--border-soft);
  line-height: 1.85; font-size: var(--story-font-size);
}
.maintext { color: var(--text-main); animation: fadeIn 0.4s ease; user-select: text; cursor: pointer; }
.maintext.streaming { color: var(--text-dim); font-style: italic; }
.loading { color: var(--text-muted); text-align: center; padding: 30px; font-size: 0.85rem; }

/* 思维链折叠框（默认展开可见，用户可手动收） */
.cot-area { margin-bottom: 10px; flex-shrink: 0; }
.cot-box { background: rgba(10,8,24,0.5); border: 1px solid var(--border-soft); border-radius: 8px; }
.cot-box summary { padding: 8px 12px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; list-style: none; user-select: none; }
.cot-box summary::before { content: '🧩 '; }
.cot-box summary::marker { display: none; }
.cot-content { padding: 10px 14px; color: var(--text-dim); font-size: 0.8rem; line-height: 1.6; font-style: italic; max-height: 200px; overflow-y: auto; }

.generating { display: flex; align-items: center; gap: 6px; color: var(--neon-cyan); font-size: 0.85rem; margin-bottom: 12px; padding: 0 4px; flex-shrink: 0; }
.gen-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon-cyan); animation: pulse 1.2s infinite; }
.gen-dot:nth-child(2) { animation-delay: 0.2s; }
.gen-dot:nth-child(3) { animation-delay: 0.4s; }

/* 底部固定区（永远可见，不被story挤压） */
.bottom-bar { flex-shrink: 0; border-top: 1px solid var(--border-soft); padding-top: 12px; margin-top: 0; background: rgba(10,8,24,0.3); border-radius: 10px; padding: 12px; }
.options-panel { margin-bottom: 10px; }
.options-panel-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(160,107,255,0.1); border: 1px solid var(--border-soft); border-radius: 8px; cursor: pointer; user-select: none; transition: all 0.2s; font-size: 0.85rem; color: var(--neon-purple); }
.options-panel-head:hover { background: rgba(160,107,255,0.18); }
.opt-chevron { font-size: 0.8rem; transition: transform 0.3s; }
.options-area { margin-top: 8px; display: flex; flex-direction: column; gap: 9px; }
.options-area.collapsed { display: none; }
.no-opt { color: var(--text-muted); font-size: 0.82rem; text-align: center; padding: 8px; font-style: italic; }
.option-btn {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 10px;
  color: var(--text-main); cursor: pointer; font-family: inherit; font-size: 0.9rem;
  text-align: left; transition: all 0.2s; animation: slideInUp 0.35s ease backwards;
}
.option-btn:nth-child(2) { animation-delay: 0.05s; }
.option-btn:nth-child(3) { animation-delay: 0.1s; }
.option-btn:nth-child(4) { animation-delay: 0.15s; }
.option-btn:hover:not(.disabled) { border-color: var(--neon-purple); background: rgba(160, 107, 255, 0.12); transform: translateX(4px); box-shadow: 0 0 14px rgba(160, 107, 255, 0.2); }
.option-btn.disabled { opacity: 0.4; cursor: not-allowed; }
.opt-id { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: var(--grad-holo); color: #0a0a14; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 0.82rem; font-family: 'Orbitron', sans-serif; }
.opt-text { flex: 1; }
.input-area { display: flex; gap: 10px; }
.input-area input { flex: 1; padding: 11px 14px; background: rgba(10, 8, 24, 0.7); border: 1px solid var(--border-soft); border-radius: 9px; color: var(--text-main); font-family: inherit; font-size: 0.9rem; }
.input-area input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(77,232,255,0.25); }
.send-btn { padding: 11px 22px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); border: none; border-radius: 9px; color: #0a0a14; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.send-btn:hover { box-shadow: 0 0 14px rgba(77, 232, 255, 0.4); }

/* ===== 状态栏侧栏 ===== */
.status-sidebar {
  width: 320px; flex-shrink: 0; background: var(--bg-panel); backdrop-filter: blur(16px);
  border: 1px solid var(--border-glow); border-radius: 14px; padding: 14px;
  overflow-y: auto; height: 100%;
}
.sidebar-loading { color: var(--text-muted); text-align: center; padding: 30px; font-size: 0.85rem; }
.sb-section { margin-bottom: 16px; padding: 12px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-soft); }
.sb-section:last-child { margin-bottom: 0; }
.sb-title { font-family: 'Orbitron', sans-serif; font-size: 0.82rem; color: var(--neon-purple); margin-bottom: 10px; letter-spacing: 1px; padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); filter: drop-shadow(0 0 4px rgba(160,107,255,0.3)); }
.sb-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; padding: 4px 0; font-size: 0.82rem; }
.sb-row span { color: var(--text-muted); flex-shrink: 0; }
.sb-row b { color: var(--text-main); text-align: right; font-weight: 500; word-break: break-all; }
.sb-row b.mood { color: var(--neon-pink); font-style: italic; }
.love-bar { height: 5px; background: rgba(10, 8, 24, 0.6); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.love-bar.small { height: 4px; }
.love-fill { height: 100%; background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple)); transition: width 0.5s ease; box-shadow: 0 0 6px rgba(255, 92, 200, 0.4); }
.npc-card { padding: 9px; background: rgba(10, 8, 24, 0.5); border-radius: 8px; margin-top: 8px; border: 1px solid var(--border-soft); }
.npc-head { display: flex; justify-content: space-between; align-items: center; }
.npc-head b { color: var(--neon-gold); font-size: 0.85rem; }
.npc-head span { color: var(--text-muted); font-size: 0.72rem; }
.npc-sub { color: var(--text-dim); font-size: 0.75rem; margin: 3px 0; }
.npc-love { color: var(--neon-pink); font-size: 0.78rem; margin-bottom: 4px; }

/* ===== 弹窗 ===== */
.modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(5,4,12,0.7); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { width: 100%; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column; background: var(--bg-panel); border: 1px solid var(--border-glow); border-radius: 14px; box-shadow: 0 0 40px rgba(77,232,255,0.2); animation: scaleIn 0.3s ease; }
.modal-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border-soft); font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); letter-spacing: 1px; }
.modal-close { width: 28px; height: 28px; border-radius: 6px; cursor: pointer; background: transparent; border: 1px solid var(--border-soft); color: var(--text-dim); }
.modal-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
.modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
.empty-tip { color: var(--text-muted); text-align: center; padding: 24px; font-size: 0.85rem; }
.chronicle-item { padding: 12px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 9px; margin-bottom: 10px; }
.chronicle-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.chronicle-head b { color: var(--neon-gold); font-size: 0.85rem; }
.rollback-btn { padding: 4px 10px; background: rgba(255,92,200,0.12); border: 1px solid var(--neon-pink); border-radius: 6px; color: var(--neon-pink); cursor: pointer; font-size: 0.75rem; font-family: inherit; }
.rollback-btn:hover { background: rgba(255,92,200,0.25); }
.chronicle-text { color: var(--text-dim); font-size: 0.82rem; line-height: 1.6; }
.mem-section { margin-bottom: 16px; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 9px; }
.mem-title { font-family: 'Orbitron', sans-serif; font-size: 0.82rem; margin-bottom: 8px; letter-spacing: 1px; }
.mem-section:nth-child(1) .mem-title { color: var(--neon-gold); }
.mem-section:nth-child(2) .mem-title { color: var(--neon-purple); }
.mem-section:nth-child(3) .mem-title { color: var(--neon-cyan); }
.mem-content { font-size: 0.82rem; line-height: 1.6; color: var(--text-dim); }
.mem-content p { margin-bottom: 6px; }
.mem-content.long { color: var(--neon-gold); font-style: italic; }
.mem-tip { color: var(--text-muted); font-size: 0.75rem; text-align: center; padding: 8px; }
.set-section { margin-bottom: 18px; padding: 14px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 9px; }
.set-title { font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); font-size: 0.85rem; margin-bottom: 12px; letter-spacing: 1px; }
.set-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 10px; }
.set-row label { display: flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 0.85rem; cursor: pointer; }
.set-row input[type=radio], .set-row input[type=checkbox] { accent-color: var(--neon-cyan); }
.set-field { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-dim); }
.set-field span { flex-shrink: 0; min-width: 70px; }
.set-field input[type=text], .set-field input[type=password], .set-field select { flex: 1; padding: 7px 10px; background: rgba(10,8,24,0.7); border: 1px solid var(--border-soft); border-radius: 6px; color: var(--text-main); font-family: inherit; font-size: 0.82rem; }
.set-field input[type=range] { flex: 1; accent-color: var(--neon-cyan); }
.set-custom { padding: 10px; background: rgba(10,8,24,0.4); border-radius: 8px; border: 1px solid var(--border-soft); }
.set-save { width: 100%; padding: 11px; background: var(--grad-holo); border: none; border-radius: 9px; color: #0a0a14; font-weight: 700; cursor: pointer; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
.set-save:hover { box-shadow: 0 0 16px rgba(77,232,255,0.4); }
.set-status { text-align: center; color: var(--neon-cyan); font-size: 0.82rem; margin-top: 10px; min-height: 18px; }

/* ===== 主题切换 ===== */
body[data-theme="darker"] { --bg-void: #050508; --neon-cyan: #6cb4ff; --neon-purple: #8a7bff; --neon-pink: #d16bff; }
body[data-theme="warm"] { --bg-void: #1a1208; --neon-cyan: #ffb86b; --neon-purple: #ff8c5c; --neon-pink: #ff5c8c; --bg-panel: rgba(38,26,12,0.78); --border-glow: rgba(255,184,107,0.25); }

/* ===== 全屏适配 ===== */
:fullscreen .game-wrap, :-webkit-full-screen .game-wrap { padding: 18px; }
:fullscreen .status-sidebar, :-webkit-full-screen .status-sidebar { max-height: 100vh; }

/* ===== 动画 ===== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

/* ===== 滚动条 ===== */
.story-area::-webkit-scrollbar, .status-sidebar::-webkit-scrollbar, .modal-body::-webkit-scrollbar, .cot-content::-webkit-scrollbar { width: 6px; }
.story-area::-webkit-scrollbar-thumb, .status-sidebar::-webkit-scrollbar-thumb, .modal-body::-webkit-scrollbar-thumb, .cot-content::-webkit-scrollbar-thumb { background: rgba(77, 232, 255, 0.3); border-radius: 3px; }
.story-area::-webkit-scrollbar-thumb:hover, .status-sidebar::-webkit-scrollbar-thumb:hover, .modal-body::-webkit-scrollbar-thumb:hover { background: rgba(77, 232, 255, 0.5); }

/* ===== 响应式 ===== */
@media (max-width: 900px) {
  .game-layout { flex-direction: column; }
  .status-sidebar { width: 100%; max-height: none; order: 2; }
  .game-main { min-height: 60vh; order: 1; }
  .topbar { flex-wrap: wrap; gap: 8px; }
  .topbar .turn-info { order: 3; flex-basis: 100%; }
  .modal { max-width: 95vw; }
}
@media (max-width: 560px) {
  .opening-card { padding: 22px 16px; }
  .opening-logo { font-size: 1.3rem; }
  .game-wrap { padding: 8px; }
  .game-main, .status-sidebar { padding: 12px; }
  .opt-btn { font-size: 0.78rem; padding: 6px 11px; }
  .option-btn { padding: 10px 12px; font-size: 0.85rem; }
  .icon-btn { width: 34px; height: 34px; }
}

  function bindBtnGroup(root) {
    const selected = {};
    root.querySelectorAll(".btn-group").forEach((grp) => {
      const name = grp.dataset.name || "";
      grp.querySelectorAll(".opt-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          grp.querySelectorAll(".opt-btn").forEach((b) => b.classList.remove("selected"));
          btn.classList.add("selected");
          selected[name] = btn.dataset.val || "";
        });
      });
    });
    return selected;
  }
  function bindOpeningForm(root) {
    const selected = bindBtnGroup(root);
    const statusEl = root.querySelector("#opening-status");
    const randomBtn = root.querySelector("#opening-random");
    randomBtn.addEventListener("click", () => {
      randomFill(root, selected);
    });
    const form = root.querySelector("#opening-form");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = collectForm(root, selected);
      if (!data.\u6027\u522B || !data.\u6027\u53D6\u5411 || !data.\u4E0A\u4E0B\u4F4D || !data.\u6E38\u620F\u9898\u6750) {
        statusEl.textContent = "\u26A0\uFE0F \u8BF7\u81F3\u5C11\u9009\u62E9 \u6027\u522B / \u6027\u53D6\u5411 / \u4E0A\u4E0B\u4F4D / \u6E38\u620F\u9898\u6750\uFF08\u6216\u70B9\u5168\u90E8\u968F\u673A\uFF09";
        statusEl.classList.add("err");
        return;
      }
      const submitBtn = root.querySelector("#opening-submit");
      submitBtn.setAttribute("disabled", "disabled");
      submitBtn.textContent = "\u6B63\u5728\u8FDB\u5165...";
      statusEl.textContent = "\u23F3 \u6B63\u5728\u521B\u5EFA\u4F60\u7684\u4E16\u754C...";
      statusEl.classList.remove("err");
      const ok1 = await initializeGameVariables(data);
      const ok2 = await createOpeningStoryMessage(data);
      if (ok1 && ok2) {
        statusEl.textContent = "\u2705 \u8FDB\u5165\u6E38\u620F\u4E2D...";
        setTimeout(() => initGameScreen(root), 800);
      } else {
        statusEl.textContent = "\u274C \u521D\u59CB\u5316\u5931\u8D25\uFF0C\u8BF7\u91CD\u8BD5";
        statusEl.classList.add("err");
        submitBtn.removeAttribute("disabled");
        submitBtn.textContent = "\u27E1 \u8FDB\u5165\u6E38\u620F \u27E1";
      }
    });
  }
  function collectForm(root, selected) {
    const get = (id) => (root.querySelector("#" + id)?.value || "").trim();
    let \u6027\u522B = selected["\u6027\u522B"] || "";
    let \u6027\u53D6\u5411 = selected["\u6027\u53D6\u5411"] || "";
    let \u4E0A\u4E0B\u4F4D = selected["\u4E0A\u4E0B\u4F4D"] || "";
    let \u6E38\u620F\u9898\u6750 = selected["\u6E38\u620F\u9898\u6750"] || "";
    return {
      \u6027\u522B,
      \u6027\u53D6\u5411,
      \u4E0A\u4E0B\u4F4D,
      \u73B0\u5B9E\u59D3\u540D: get("f-name"),
      \u5E74\u9F84: parseInt(get("f-age")) || 16 + Math.floor(Math.random() * 12),
      \u73B0\u5B9E\u8EAB\u4EFD: get("f-identity"),
      \u6E38\u620F\u9898\u6750,
      \u6E38\u620F\u540D\u79F0: get("f-game"),
      \u7F51\u540D: get("f-netname"),
      \u804C\u4E1A: get("f-job"),
      \u4E2A\u6027\u7B7E\u540D: get("f-sig")
    };
  }
  var RANDOM_NAMES = ["\u6C88\u781A", "\u9646\u77E5\u590F", "\u987E\u5DDD", "\u6797\u662D", "\u82CF\u5C7F", "\u6C5F\u5E8F", "\u6E29\u91CE", "\u7941\u7720"];
  var RANDOM_GAMES = ["\u661F\u9668\u7EAA\u5143", "\u4E5D\u9704", "\u5E9F\u571F\u9ECE\u660E", "\u5E7B\u754COnline", "\u6CA7\u6E9F\u5F55"];
  var RANDOM_JOBS = ["\u5251\u58EB", "\u6CD5\u5E08", "\u523A\u5BA2", "\u5F13\u624B", "\u6CBB\u7597\u8005", "\u53EC\u5524\u5E08"];
  var RANDOM_SIGS = ["\u4ECA\u5929\u4E5F\u662F\u60F3\u9000\u4F11\u7684\u4E00\u5929", "\u809D\u5E1D\u672C\u5E1D", "\u4E0D\u7EC4\u961F\uFF0C\u52FF\u6270", "\u5728\uFF1F\u770B\u770B\u4F60\u7684\u88C5\u5907", "\u4F5B\u7CFB\u73A9\u5BB6\uFF0C\u968F\u7F18\u7EC4\u672C"];
  function randomFill(root, selected) {
    const set = (id, v) => {
      const el = root.querySelector("#" + id);
      if (el) el.value = v;
    };
    const pickGroup = (name, val) => {
      selected[name] = val;
      root.querySelectorAll(`.btn-group[data-name="${name}"] .opt-btn`).forEach((b) => {
        b.classList.toggle("selected", b.dataset.val === val);
      });
    };
    pickGroup("\u6027\u522B", Math.random() > 0.5 ? "\u7537" : "\u5973");
    pickGroup("\u6027\u53D6\u5411", ["bl", "gl", "bg", "gb", "\u5168\u80FD\u63A5\u53D7"][Math.floor(Math.random() * 5)]);
    pickGroup("\u4E0A\u4E0B\u4F4D", ["\u4E0A\u4F4D", "\u4E0B\u4F4D", "\u89C6\u60C5\u51B5\u7686\u53EF"][Math.floor(Math.random() * 3)]);
    pickGroup("\u6E38\u620F\u9898\u6750", ["\u897F\u5E7B", "\u6B66\u4FA0", "\u672B\u4E16", "\u79D1\u5E7B"][Math.floor(Math.random() * 4)]);
    set("f-name", RANDOM_NAMES[Math.floor(Math.random() * RANDOM_NAMES.length)]);
    set("f-age", String(16 + Math.floor(Math.random() * 12)));
    set("f-identity", ["\u5927\u4E8C\u5B66\u751F", "\u9AD8\u4E09\u5B66\u751F", "\u4E0A\u73ED\u65CF", "\u81EA\u7531\u804C\u4E1A", "\u5BCC\u4E8C\u4EE3"][Math.floor(Math.random() * 5)]);
    set("f-game", RANDOM_GAMES[Math.floor(Math.random() * RANDOM_GAMES.length)]);
    set("f-netname", "\u73A9\u5BB6" + Math.floor(Math.random() * 9e3 + 1e3));
    set("f-job", RANDOM_JOBS[Math.floor(Math.random() * RANDOM_JOBS.length)]);
    set("f-sig", RANDOM_SIGS[Math.floor(Math.random() * RANDOM_SIGS.length)]);
  }

  // E:/jiuguanzhushou/src/全息网游模拟器/index.tsx
  function boot() {
    let stage = "opening";
    try {
      const lastId = getLastMessageId();
      console.log("\u{1F680} [index] lastMessageId =", lastId);
      if (lastId > 0) {
        const m = getChatMessages(1);
        if (m && m.length > 0 && m[0].message) stage = "game";
        else stage = "opening";
      } else {
        stage = "opening";
      }
    } catch (e) {
      console.error("\u274C [index] \u5224\u65AD\u9636\u6BB5\u5931\u8D25", e);
      stage = "opening";
    }
    const root = document.getElementById("app");
    if (!root) {
      console.error("\u65E0 #app \u8282\u70B9");
      return;
    }
    initOpeningForm(root, stage);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
