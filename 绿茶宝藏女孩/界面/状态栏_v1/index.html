<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绿茶宝藏女孩 · 状态栏</title>
<style>
/* 绿茶宝藏女孩 · 状态栏 UI
   主题：表面纯情少女（樱花粉）× 内里算计（墨绿茶汤）
   签名元素：茶杯水位=真心度，品级茶标，鱼塘涟漪 */

:root {
  /* 调色盘：茶汤系 */
  --tea-darkest: #0d1f17;        /* 深茶底 */
  --tea-dark: #14281d;           /* 主背景 */
  --tea-mid: #1d3a2a;            /* 卡片底 */
  --tea-light: #2d5440;          /* 边框/分隔 */
  --tea-foam: #c8e6c9;           /* 茶沫高光 */
  --tea-glow: #7cc5a0;           /* 主强调（茶汤绿） */

  /* 反差点：纯情少女粉 vs 算计墨绿 */
  --sakura: #f4b6c2;             /* 樱花粉（纯情表象）*/
  --sakura-soft: #f8d7dd;
  --sakura-glow: #ff8fa3;        /* 真心度强调 */

  /* 中性 */
  --ink: #e8f0ea;                /* 主文字 */
  --ink-dim: #8fa89a;            /* 次要文字 */
  --ink-faint: #5a7268;           /* 弱化文字 */
  --gold: #d4a574;                /* 品级/B级卡 */
  --warn: #e07a5f;                /* 翻车/警告 */
  --shadow: 0 8px 32px rgba(0,0,0,.45);

  /* 字体 */
  --font-display: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
  --font-body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "JetBrains Mono", "Consolas", monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: linear-gradient(160deg, var(--tea-darkest) 0%, var(--tea-dark) 60%, var(--tea-mid) 100%);
  color: var(--ink);
  min-height: 480px;
  padding: 14px 16px 18px;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
  line-height: 1.55;
  overflow-x: hidden;
}

/* 整体容器 */
.status-root {
  max-width: 640px;
  margin: 0 auto;
  font-size: 13.5px;
}

/* ===== 顶部主卡：茶杯签名区 ===== */
.hero {
  position: relative;
  background: linear-gradient(135deg, rgba(29,58,42,.9), rgba(20,40,29,.95));
  border: 1px solid var(--tea-light);
  border-radius: 14px;
  padding: 16px 18px 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.hero::before {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(circle at 88% 12%, rgba(124,197,160,.14), transparent 45%),
              radial-gradient(circle at 10% 90%, rgba(244,182,194,.08), transparent 40%);
  pointer-events: none;
}
.hero-row { display: flex; align-items: center; gap: 14px; position: relative; }

/* 茶杯签名 SVG 容器 */
.tea-cup {
  width: 64px; height: 64px;
  flex-shrink: 0;
  position: relative;
}
.tea-cup svg { width: 100%; height: 100%; }
.cup-water {
  transition: y .8s cubic-bezier(.4,0,.2,1), height .8s cubic-bezier(.4,0,.2,1);
}
.cup-leaf { animation: float-leaf 4s ease-in-out infinite; transform-origin: center; }
@keyframes float-leaf {
  0%,100% { transform: rotate(-8deg) translateX(-2px); }
  50% { transform: rotate(10deg) translateX(2px); }
}

.hero-text { flex: 1; min-width: 0; }
.hero-name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--ink);
  margin-bottom: 4px;
  text-shadow: 0 2px 12px rgba(124,197,160,.25);
}
.hero-name .grade-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--gold);
  background: rgba(212,165,116,.12);
  border: 1px solid rgba(212,165,116,.4);
  border-radius: 4px;
  padding: 2px 7px;
  margin-left: 8px;
  vertical-align: middle;
  font-weight: 700;
}
.hero-stage {
  font-size: 12px;
  color: var(--ink-dim);
  display: flex; gap: 10px; flex-wrap: wrap;
}
.hero-stage span { display: inline-flex; align-items: center; gap: 4px; }
.hero-stage .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--tea-glow); }
.hero-stage .dot.sakura { background: var(--sakura-glow); }

/* 真心度进度条（核心指标） */
.heart-meter {
  position: relative;
  margin-top: 14px;
  height: 22px;
  background: rgba(0,0,0,.25);
  border-radius: 11px;
  overflow: hidden;
  border: 1px solid rgba(255,143,163,.18);
}
.heart-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  width: 0%;
  background: linear-gradient(90deg, var(--sakura-soft) 0%, var(--sakura-glow) 70%, var(--sakura) 100%);
  border-radius: 11px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 14px rgba(255,143,163,.5);
}
.heart-fill::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
  animation: shimmer 2.4s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.heart-label {
  position: absolute; inset: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  z-index: 1;
}
.heart-label .lh { color: var(--sakura-soft); text-shadow: 0 1px 4px rgba(0,0,0,.6); }
.heart-label .rh { color: var(--ink); font-weight: 700; }

/* ===== 折叠区头 ===== */
.collapsible {
  margin-top: 12px;
  background: rgba(20,40,29,.5);
  border: 1px solid var(--tea-light);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .3s;
}
.collapsible.open { border-color: var(--tea-glow); }
.collap-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px;
  cursor: pointer;
  user-select: none;
  transition: background .2s;
}
.collap-head:hover { background: rgba(124,197,160,.06); }
.collap-head h2 {
  font-family: var(--font-display);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--tea-foam);
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 8px;
}
.collap-head h2 .idx {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-faint);
  font-weight: 400;
}
.collap-head .chev {
  width: 14px; height: 14px;
  border-right: 2px solid var(--ink-dim);
  border-bottom: 2px solid var(--ink-dim);
  transform: rotate(45deg);
  transition: transform .3s;
  margin-bottom: 4px;
}
.collapsible.open .chev { transform: rotate(-135deg); margin-bottom: -4px; }
.collap-body {
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease;
}
.collapsible.open .collap-body { max-height: 900px; }

/* 字段网格 */
.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--tea-light);
  border-top: 1px solid var(--tea-light);
}
.field {
  background: rgba(13,31,23,.4);
  padding: 9px 14px;
  display: flex; flex-direction: column; gap: 3px;
  min-height: 44px;
}
.field.full { grid-column: 1 / -1; }
.field .k {
  font-size: 10.5px;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  font-family: var(--font-mono);
  text-transform: uppercase;
}
.field .v {
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
}
.field .v.sakura { color: var(--sakura-glow); }
.field .v.warn { color: var(--warn); }
.field .v.good { color: var(--tea-glow); }
.field .v.mono { font-family: var(--font-mono); font-weight: 600; }

/* 鱼塘状态可视化 */
.pond-viz {
  display: flex; gap: 5px; align-items: center; margin-top: 3px;
}
.fish-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--tea-glow);
  opacity: .3;
  transition: all .4s;
}
.fish-dot.alive { opacity: 1; box-shadow: 0 0 6px var(--tea-glow); }
.fish-dot.gone { background: var(--warn); opacity: .4; }

/* 心理活动引言 */
.quote {
  grid-column: 1 / -1;
  background: linear-gradient(90deg, rgba(244,182,194,.08), rgba(124,197,160,.06));
  border-top: 1px solid rgba(244,182,194,.2);
  padding: 12px 16px;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 13px;
  color: var(--sakura-soft);
  line-height: 1.6;
  position: relative;
}
.quote::before {
  content: "「";
  position: absolute; left: 4px; top: 8px;
  font-size: 22px; color: var(--sakura); opacity: .4;
}
.quote .qtext { padding-left: 18px; }

/* 章节阶段时间线 */
.timeline {
  padding: 12px 14px;
  display: flex; gap: 4px; align-items: flex-start;
  border-top: 1px solid var(--tea-light);
  overflow-x: auto;
}
.tl-node {
  flex: 1; min-width: 0;
  text-align: center;
  font-size: 10px;
  color: var(--ink-faint);
  padding: 6px 2px;
  border-radius: 6px;
  position: relative;
  transition: all .3s;
}
.tl-node .tl-mark {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--tea-light);
  margin: 0 auto 5px;
  border: 1.5px solid var(--ink-faint);
  transition: all .3s;
}
.tl-node.active { color: var(--sakura-glow); }
.tl-node.active .tl-mark {
  background: var(--sakura-glow);
  border-color: var(--sakura-glow);
  box-shadow: 0 0 10px var(--sakura-glow);
}
.tl-node.passed .tl-mark { background: var(--tea-glow); border-color: var(--tea-glow); }
.tl-node .tl-label {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 9.5px; letter-spacing: 0.02em;
}

/* 空态 */
.empty {
  padding: 40px 20px; text-align: center;
  color: var(--ink-faint); font-size: 12px;
}
.empty .teapot { font-size: 36px; margin-bottom: 8px; opacity: .4; }

/* 底部署名 */
.foot {
  margin-top: 10px;
  text-align: center;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
  font-family: var(--font-mono);
}
.foot .sep { color: var(--tea-light); margin: 0 6px; }

/* 响应式：窄窗单列 */
@media (max-width: 480px) {
  .fields { grid-template-columns: 1fr; }
  .hero-name { font-size: 19px; }
  body { padding: 10px 12px 14px; font-size: 12.5px; }
}

/* reduced motion */
@media (prefers-reduced-motion: reduce) {
  .heart-fill::after, .cup-leaf { animation: none; }
  * { transition-duration: .01ms !important; }
}

</style>
</head>
<body>
<div id="status-root" class="status-root"></div>
<script>
/* 绿茶宝藏女孩 · 状态栏逻辑
   读取 window.__statusRaw，解析 <StatusBlock> 字段，渲染到 DOM
   轮询兜底 + 事件订阅（非MVU卡，无VARIABLE_UPDATE_ENDED，用轮询）
   日志前缀统一 [绿茶状态栏] */

(function () {
  const TAG = "[绿茶状态栏]";
  console.log(TAG, "脚本启动");

  const root = document.getElementById("status-root");
  if (!root) { console.error(TAG, "未找到#status-root"); return; }

  // 字段名映射（处理可能的冒号变体）
  const STAGES = ["警惕", "试探", "动摇", "真心", "沦陷"];
  const PHASES = ["初遇试探", "鱼塘翻车", "雪中送炭", "告白被拒", "堵截挽回"];

  function parseStatusBlock(raw) {
    if (!raw) return null;
    const fields = {};
    const lines = String(raw).split(/\r?\n+/);
    for (const line of lines) {
      const m = line.match(/^\s*([^\s:：]+)\s*[:：]\s*(.+?)\s*$/);
      if (m) fields[m[1].trim()] = m[2].trim();
    }
    return fields;
  }

  function readRaw() {
    try {
      if (typeof window.__statusRaw !== "undefined" && window.__statusRaw) {
        return window.__statusRaw;
      }
    } catch (e) { console.error(TAG, "读取__statusRaw异常", e); }
    return null;
  }

  function pct(str) {
    if (!str) return 0;
    const m = String(str).match(/(\d+)/);
    const n = m ? parseInt(m[1], 10) : 0;
    return Math.max(0, Math.min(100, isNaN(n) ? 0 : n));
  }

  function heartStageClass(stage) {
    if (!stage) return "";
    if (stage.indexOf("沦陷") >= 0 || stage.indexOf("真心") >= 0) return "sakura";
    return "";
  }

  function pondDots(state) {
    // 完好=4 alive, 动摇=3 alive 1 gone, 已翻车=2 gone, 已崩盘=4 gone
    const total = 4;
    let alive = 0;
    if (state && state.indexOf("完好") >= 0) alive = 4;
    else if (state && state.indexOf("动摇") >= 0) alive = 3;
    else if (state && state.indexOf("已翻车") >= 0) alive = 1;
    else if (state && state.indexOf("已崩盘") >= 0) alive = 0;
    else if (state && state.indexOf("翻车") >= 0) alive = 1;
    else alive = 2;
    let html = "";
    for (let i = 0; i < total; i++) {
      const cls = i < alive ? "fish-dot alive" : "fish-dot gone";
      html += `<span class="${cls}"></span>`;
    }
    return html;
  }

  function timelineHtml(phase) {
    const cur = PHASES.indexOf(phase);
    return PHASES.map((p, i) => {
      let cls = "tl-node";
      if (i === cur) cls += " active";
      else if (cur >= 0 && i < cur) cls += " passed";
      return `<div class="${cls}"><div class="tl-mark"></div><div class="tl-label">${p}</div></div>`;
    }).join("");
  }

  function esc(s) {
    if (!s) return "";
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function render(fields) {
    if (!fields) {
      root.innerHTML = `<div class="empty"><div class="teapot">🍵</div>等待采茶中…<br><span style="opacity:.6">柳婷婷尚未登场</span></div>`;
      return;
    }
    const name = esc(fields["姓名"] || fields["姓名:"] || "柳婷婷");
    const scene = esc(fields["当前场景"] || "—");
    const time = esc(fields["时间"] || "—");
    const phase = esc(fields["章节阶段"] || "—");
    const grade = esc(fields["坏女人品级"] || "B级");
    const stage = esc(fields["好感阶段"] || "—");
    const progress = esc(fields["攻略进度"] || "—");
    const truthRaw = fields["真心度"] || "0";
    const truth = pct(truthRaw);
    const pond = esc(fields["鱼塘状态"] || "—");
    const emotion = esc(fields["当前情绪"] || "—");
    const thought = esc(fields["心理活动"] || "");

    const stageCls = heartStageClass(fields["好感阶段"] || "");
    const pondCls = (fields["鱼塘状态"] || "").indexOf("翻车") >= 0 || (fields["鱼塘状态"] || "").indexOf("崩盘") >= 0 ? "warn" : "good";

    // 茶杯水位 = 真心度（水位y从底向上）
    const waterY = 60 - (truth / 100) * 42; // 杯内 18-60 范围
    const waterH = (truth / 100) * 42;

    root.innerHTML = `
      <div class="hero">
        <div class="hero-row">
          <div class="tea-cup">
            <svg viewBox="0 0 80 80">
              <defs>
                <linearGradient id="teaG" x1="0" y1="1" x2="0" y2="0">
                  <stop offset="0%" stop-color="#2d5440"/>
                  <stop offset="100%" stop-color="#7cc5a0"/>
                </linearGradient>
                <clipPath id="cupClip">
                  <path d="M18 22 L62 22 L57 64 Q57 70 51 70 L29 70 Q23 70 23 64 Z"/>
                </clipPath>
              </defs>
              <ellipse cx="40" cy="22" rx="22" ry="6" fill="none" stroke="#2d5440" stroke-width="2.5"/>
              <g clip-path="url(#cupClip)">
                <rect class="cup-water" x="14" y="${waterY}" width="52" height="${waterH + 6}" fill="url(#teaG)" opacity="0.85"/>
                <ellipse cx="40" cy="${waterY}" rx="22" ry="3.5" fill="#c8e6c9" opacity="0.6"/>
                <g class="cup-leaf" transform="translate(40 ${waterY})">
                  <path d="M0 -4 Q6 -1 4 4 Q-2 3 -3 -1 Q-1 -3 0 -4 Z" fill="#7cc5a0" opacity="0.9"/>
                </g>
              </g>
              <path d="M18 22 L62 22 L57 64 Q57 70 51 70 L29 70 Q23 70 23 64 Z" fill="none" stroke="#7cc5a0" stroke-width="2.5" stroke-linejoin="round"/>
              <path d="M62 30 Q70 34 68 42 Q66 48 60 48" fill="none" stroke="#7cc5a0" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="hero-text">
            <div class="hero-name">${name}<span class="grade-tag">${grade}</span></div>
            <div class="hero-stage">
              <span><span class="dot sakura"></span>${stage}</span>
              <span><span class="dot"></span>${scene}</span>
              <span style="color:var(--ink-faint)">${time}</span>
            </div>
          </div>
        </div>
        <div class="heart-meter">
          <div class="heart-fill" style="width:${truth}%"></div>
          <div class="heart-label">
            <span class="lh">真心度</span>
            <span class="rh">${truth}%</span>
          </div>
        </div>
      </div>

      <div class="collapsible open" id="c1">
        <div class="collap-head" onclick="window.__toggleC('c1')">
          <h2><span class="idx">01</span>当前状态</h2>
          <div class="chev"></div>
        </div>
        <div class="collap-body">
          <div class="fields">
            <div class="field"><span class="k">阶段</span><span class="v">${phase}</span></div>
            <div class="field"><span class="k">好感</span><span class="v ${stageCls}">${stage}</span></div>
            <div class="field full"><span class="k">攻略进度</span><span class="v">${progress}</span></div>
            <div class="field full"><span class="k">鱼塘状态</span>
              <span class="v ${pondCls}">${pond}</span>
              <div class="pond-viz">${pondDots(fields["鱼塘状态"])}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="collapsible open" id="c2">
        <div class="collap-head" onclick="window.__toggleC('c1')">
          <h2><span class="idx">02</span>她此刻内心</h2>
          <div class="chev"></div>
        </div>
        <div class="collap-body">
          <div class="fields">
            <div class="field full"><span class="k">当前情绪</span><span class="v sakura">${emotion}</span></div>
            ${thought ? `<div class="quote"><div class="qtext">${thought}</div></div>` : ""}
          </div>
        </div>
      </div>

      <div class="collapsible" id="c3">
        <div class="collap-head" onclick="window.__toggleC('c3')">
          <h2><span class="idx">03</span>剧情阶段线</h2>
          <div class="chev"></div>
        </div>
        <div class="collap-body">
          <div class="timeline">${timelineHtml(fields["章节阶段"])}</div>
        </div>
      </div>

      <div class="foot">采茶人手记<span class="sep">·</span>江临渊视角</div>
    `;
    console.log(TAG, "渲染完成", { truth, stage, phase, pond });
  }

  // 折叠切换
  window.__toggleC = function (id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle("open");
  };

  // 初始空态
  render(null);

  // 轮询读取（非MVU，正则注入__statusRaw后重渲染）
  let lastSig = "";
  let pollTimer = null;
  function tick() {
    const raw = readRaw();
    if (raw) {
      const sig = String(raw).slice(0, 80) + String(raw).length;
      if (sig !== lastSig) {
        lastSig = sig;
        const fields = parseStatusBlock(raw);
        if (fields && Object.keys(fields).length) {
          render(fields);
        }
      }
    } else {
      lastSig = "";
      render(null);
    }
  }
  // 启动
  tick();
  pollTimer = setInterval(tick, 800);
  // 页面隐藏时暂停
  window.addEventListener("pagehide", () => { if (pollTimer) clearInterval(pollTimer); });

  console.log(TAG, "脚本就绪，轮询中");
})();

</script>
</body>
</html>
