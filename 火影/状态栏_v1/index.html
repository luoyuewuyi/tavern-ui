<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>蹇嶅姟璁板綍 - MVU鐘舵€佹爮</title>
<style>
/* ============ CSS Variables ============ */
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121f;
  --bg-card: rgba(26, 26, 46, 0.88);
  --bg-card-hover: rgba(34, 34, 56, 0.95);
  --orange: #ff6b35;
  --orange-dark: #e55a2b;
  --red-fire: #ff3838;
  --gold: #ffd700;
  --gold-dark: #c8a832;
  --blue-light: #4fc3f7;
  --green-leaf: #7cb342;
  --text-primary: #e8e0d0;
  --text-secondary: #a09888;
  --text-muted: #706860;
  --border-color: rgba(255, 107, 53, 0.25);
  --border-strong: rgba(255, 107, 53, 0.45);
  --shadow-glow: rgba(255, 107, 53, 0.15);
  --scroll-rod-top: linear-gradient(90deg, #3a2510, #8b6914, #d4a843, #8b6914, #3a2510);
  --scroll-rod-bottom: linear-gradient(90deg, #3a2510, #8b6914, #d4a843, #8b6914, #3a2510);
  --font-cn: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', 'Times New Roman', serif;
  --font-mono: 'Courier New', Courier, monospace;
}

/* ============ Reset & Base ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 107, 53, 0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 107, 53, 0.5); }

html { font-size: 14px; }

body {
  font-family: var(--font-cn);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow: hidden;
  min-height: 100vh;
}

/* ============ Scroll Wrapper ============ */
.scroll-wrapper {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255, 107, 53, 0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(255, 56, 56, 0.04) 0%, transparent 45%),
    linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
}

/* Scroll rods */
.scroll-rod {
  flex-shrink: 0;
  height: 7px;
  position: relative;
  z-index: 5;
}
.scroll-rod.top {
  background: var(--scroll-rod-top);
  box-shadow: 0 3px 12px rgba(0,0,0,0.7), inset 0 1px 2px rgba(212,168,67,0.3);
}
.scroll-rod.bottom {
  background: var(--scroll-rod-bottom);
  box-shadow: 0 -3px 12px rgba(0,0,0,0.7), inset 0 -1px 2px rgba(212,168,67,0.3);
}

/* Scroll rod end caps */
.scroll-rod::before,
.scroll-rod::after {
  content: '';
  position: absolute;
  top: -6px;
  width: 14px;
  height: 19px;
  background: radial-gradient(ellipse at center, #5a3e1b, #2a1a0a);
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}
.scroll-rod::before { left: 8px; }
.scroll-rod::after { right: 8px; }

/* ============ App Container ============ */
#app {
  flex: 1;
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 16px 20px;
  min-height: 600px;
}

/* ============ Top Info Bar ============ */
#top-bar {
  background: linear-gradient(180deg, rgba(26,26,46,0.9), rgba(20,20,36,0.85));
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 2px;
  position: relative;
  overflow: hidden;
}
#top-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--orange), var(--red-fire), var(--orange), transparent);
}

.top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.location-display {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--gold);
  text-shadow: 0 0 8px rgba(255,215,0,0.15);
}
.location-display .loc-sep {
  color: var(--orange);
  margin: 0 2px;
}
.time-display {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--blue-light);
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.env-desc {
  font-size: 0.8rem;
  color: var(--text-secondary);
  border-left: 3px solid var(--blue-light);
  padding-left: 10px;
  margin-bottom: 6px;
  line-height: 1.5;
}

.scene-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.scene-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  overflow-x: auto;
  max-width: 65%;
}
.scene-tag {
  display: inline-block;
  padding: 2px 10px;
  font-size: 0.7rem;
  border-radius: 20px;
  background: rgba(255,107,53,0.12);
  border: 1px solid rgba(255,107,53,0.2);
  color: var(--text-secondary);
  white-space: nowrap;
  cursor: default;
}
.scene-tag.active {
  background: rgba(79,195,247,0.12);
  border-color: rgba(79,195,247,0.3);
  color: var(--blue-light);
}
.story-progress {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-align: right;
  line-height: 1.4;
}
.story-progress .sp-label { color: var(--gold-dark); }
.story-progress .sp-val { color: var(--text-secondary); }

/* ============ Top Separator ============ */
.top-sep {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--orange), var(--red-fire), var(--orange), transparent);
  margin: 10px 0 6px;
}

/* ============ Tab Navigation ============ */
.tab-nav {
  display: flex;
  gap: 2px;
  margin-bottom: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 3px;
  border: 1px solid rgba(255,107,53,0.12);
}
.tab-btn {
  flex: 1;
  padding: 7px 10px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-cn);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  white-space: nowrap;
}
.tab-btn:hover {
  color: var(--text-secondary);
  background: rgba(255,107,53,0.06);
}
.tab-btn.active {
  color: var(--gold);
  background: rgba(255,107,53,0.12);
  box-shadow: inset 0 -2px 0 var(--orange), 0 0 12px rgba(255,107,53,0.08);
  font-weight: 600;
}

/* ============ Tab Content ============ */
.tab-content {
  display: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.tab-content.active {
  display: block;
  opacity: 1;
}

/* ============ Section Title ============ */
.section-title {
  font-size: 0.85rem;
  color: var(--gold);
  margin: 12px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(255,215,0,0.12);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .st-icon {
  font-size: 0.9rem;
}

/* ============ Card Grid ============ */
.card-grid {
  display: grid;
  gap: 8px;
}
.card-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.card-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.card-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.card-grid.cols-auto { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

/* ============ Card Base ============ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 10px 12px;
  transition: all 0.25s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: linear-gradient(180deg, var(--orange), var(--red-fire));
  opacity: 0;
  transition: opacity 0.25s ease;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(255,107,53,0.12);
  border-color: var(--border-strong);
  background: var(--bg-card-hover);
}
.card:hover::before { opacity: 1; }
.card.clickable { cursor: pointer; }

.card-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.card-value {
  font-size: 0.85rem;
  color: var(--text-primary);
  word-break: break-word;
}

/* ============ Info Grid (Profile basic) ============ */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
}
.info-cell {
  background: var(--bg-card);
  border: 1px solid rgba(255,107,53,0.1);
  border-radius: 6px;
  padding: 6px 10px;
  text-align: center;
  transition: border-color 0.2s;
}
.info-cell:hover { border-color: rgba(255,107,53,0.3); }
.info-cell .ic-label {
  font-size: 0.62rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.info-cell .ic-value {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
}

/* ============ Ninja Info Card ============ */
.ninja-info-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 12px 14px;
  margin: 8px 0;
}
.ninja-info-card .nic-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 6px;
}
.ninja-info-card .nic-label {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.ninja-info-card .nic-value {
  font-size: 0.85rem;
  color: var(--text-primary);
  font-weight: 500;
}
.rank-tag {
  display: inline-block;
  padding: 1px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--gold);
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.2);
}

/* Progress Bar */
.progress-wrap {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  margin: 4px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--red-fire));
  border-radius: 3px;
  transition: width 0.6s ease;
  width: 0%;
}

/* ============ Chakra Tag ============ */
.chakra-tag {
  display: inline-flex;
  align-items: center;
  padding: 1px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 500;
  margin: 1px 2px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
}

/* ============ Skill/Item Card ============ */
.skill-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.25s ease;
}
.skill-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(255,107,53,0.12);
  border-color: var(--border-strong);
}
.skill-card .sc-name {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.skill-card .sc-type {
  font-size: 0.65rem;
  color: var(--text-muted);
  display: inline-block;
  padding: 0 6px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
}
.skill-card .sc-proficiency {
  font-size: 0.65rem;
  color: var(--orange);
  margin-top: 2px;
}
.skill-card.special .sc-name { color: #ce93d8; }
.skill-card.special { border-color: rgba(206,147,216,0.2); }
.skill-card.special:hover { border-color: rgba(206,147,216,0.4); }
.skill-card.special:hover { box-shadow: 0 4px 16px rgba(206,147,216,0.1); }

/* ============ Character Card (Sister) ============ */
.char-hero {
  background: linear-gradient(135deg, rgba(26,26,46,0.95), rgba(40,20,30,0.9));
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.char-hero::after {
  content: '';
  position: absolute;
  bottom: -30px; right: -20px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(255,56,56,0.06), transparent 70%);
  pointer-events: none;
}
.char-hero-name {
  font-size: 1.4rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--red-fire), var(--blue-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.char-hero-title {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.char-attrs {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 6px;
}
.char-attr {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,107,53,0.08);
  border-radius: 6px;
  padding: 5px 10px;
}
.char-attr .ca-label {
  font-size: 0.62rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.char-attr .ca-value {
  font-size: 0.8rem;
  color: var(--text-primary);
  font-weight: 500;
}

/* Sharingan Visual */
.sharingan-display {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.sharingan-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff1744;
  box-shadow: 0 0 6px rgba(255,23,68,0.8), 0 0 12px rgba(255,23,68,0.4);
  animation: sharinganPulse 2s ease-in-out infinite;
}
@keyframes sharinganPulse {
  0%, 100% { box-shadow: 0 0 6px rgba(255,23,68,0.8), 0 0 12px rgba(255,23,68,0.4); }
  50% { box-shadow: 0 0 10px rgba(255,23,68,1), 0 0 20px rgba(255,23,68,0.6); }
}
.sharingan-triple {
  display: inline-grid;
  grid-template-columns: repeat(2, 12px);
  gap: 2px;
  align-items: center;
}
.sharingan-triple .sd-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #ff1744;
  box-shadow: 0 0 6px #ff1744;
  animation: sharinganPulse 2s ease-in-out infinite;
}
.sharingan-triple .sd-dot:nth-child(1) { grid-column: 1; grid-row: 1; }
.sharingan-triple .sd-dot:nth-child(3) { grid-column: 2; grid-row: 1; }
.sharingan-triple .sd-dot:nth-child(2) { grid-column: 1 / 3; grid-row: 2; justify-self: center; }
.sharingan-mangekyo {
  font-size: 1.1rem;
  color: #ff1744;
  animation: mangekyoSpin 3s linear infinite;
  display: inline-block;
}
@keyframes mangekyoSpin {
  0% { transform: rotate(0deg); filter: drop-shadow(0 0 4px #ff1744); }
  50% { filter: drop-shadow(0 0 10px #ff1744) drop-shadow(0 0 20px rgba(255,23,68,0.4)); }
  100% { transform: rotate(360deg); filter: drop-shadow(0 0 4px #ff1744); }
}
.sharingan-eternal {
  font-size: 1.1rem;
  color: #e040fb;
  animation: eternalGlow 2s ease-in-out infinite;
  display: inline-block;
}
@keyframes eternalGlow {
  0%, 100% { filter: drop-shadow(0 0 4px #e040fb) drop-shadow(0 0 8px rgba(224,64,251,0.4)); }
  50% { filter: drop-shadow(0 0 10px #e040fb) drop-shadow(0 0 20px rgba(224,64,251,0.6)); }
}
.sharingan-rinnegan {
  display: inline-block;
  font-size: 1rem;
  animation: rinneganRotate 4s linear infinite;
}
@keyframes rinneganRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Affection Display */
.affection-display {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.affection-value {
  font-size: 1rem;
  font-weight: 700;
}
.affection-label {
  font-size: 0.7rem;
  padding: 1px 8px;
  border-radius: 20px;
  background: rgba(255,64,129,0.1);
  border: 1px solid rgba(255,64,129,0.2);
}
.affection-glow {
  text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
}

/* Confidential Tag */
.confidential-tag {
  display: inline-block;
  padding: 1px 8px;
  font-size: 0.6rem;
  font-weight: 700;
  color: #ff1744;
  background: rgba(255,23,68,0.1);
  border: 1px solid rgba(255,23,68,0.3);
  border-radius: 4px;
  letter-spacing: 1px;
  animation: confidentialBlink 1.5s ease-in-out infinite;
}
@keyframes confidentialBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ============ NPC Gallery ============ */
.npc-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.25s ease;
}
.npc-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(255,107,53,0.12);
}
.npc-card.male { border-left: 3px solid rgba(100,120,140,0.4); }
.npc-card.female { border-left: 3px solid rgba(200,100,180,0.4); }
.npc-card .npc-name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}
.npc-card .npc-meta {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ============ Modal ============ */
#modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
#modal-overlay.open {
  display: flex;
}
#modal-box {
  background: linear-gradient(180deg, #1a1a2e, #141428);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  max-width: 520px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 0;
  animation: modalIn 0.3s ease;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,107,53,0.06);
}
@keyframes modalIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
#modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,107,53,0.12);
  position: sticky;
  top: 0;
  background: rgba(26,26,46,0.98);
  z-index: 2;
  border-radius: 12px 12px 0 0;
}
#modal-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--gold);
}
#modal-close {
  width: 28px; height: 28px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: var(--text-muted);
  font-size: 1.1rem;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
#modal-close:hover {
  background: rgba(255,23,68,0.15);
  color: #ff1744;
}
#modal-body {
  padding: 14px 18px 18px;
}

/* Modal Inner Styles */
.modal-field {
  margin-bottom: 8px;
}
.modal-field .mf-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 1px;
}
.modal-field .mf-value {
  font-size: 0.85rem;
  color: var(--text-primary);
}
.modal-divider {
  border: none;
  border-top: 1px solid rgba(255,107,53,0.08);
  margin: 10px 0;
}

/* Red Chamber Modal */
.red-chamber-section {
  margin-bottom: 14px;
}
.rcs-title {
  font-size: 0.8rem;
  color: #e040fb;
  margin-bottom: 6px;
  padding-bottom: 3px;
  border-bottom: 1px solid rgba(224,64,251,0.15);
}
.rcs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
}
.rcs-item {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(224,64,251,0.1);
  border-radius: 6px;
  padding: 6px 8px;
  text-align: center;
}
.rcs-item .ri-label {
  font-size: 0.65rem;
  color: #ce93d8;
}
.rcs-item .ri-value {
  font-size: 0.75rem;
  color: var(--text-primary);
  margin-top: 1px;
}

/* ============ Loading & Empty ============ */
.loading-state {
  text-align: center;
  padding: 30px 20px;

/* ============ CSS Decorative Fire ============ */

<script>
(function() {
  'use strict';

  /* ========== Constants ========== */
  var RANK_MAP = { 1: '涓嬪繊', 2: '涓繊', 3: '涓婂繊', 4: '绮捐嫳涓婂繊', 5: '涓夊繊', 6: '褰?, 7: '瓒呭奖', 8: '鍏亾浠欎汉' };

  var CHAKRA_COLORS = {
    '椋?: '#7cb342',
    '闆?: '#ffd54f',
    '姘?: '#4fc3f7',
    '鐏?: '#ff6b35',
    '鍦?: '#a1887f',
    '闃?: '#9c27b0',
    '闃?: '#f5f5f5'
  };

  var FIELD_LABELS = {
    '褰撳墠鍏崇郴': '鍏崇郴',
    '濂芥劅搴?: '濂芥劅搴?,
    '蹇嶈€呭ご琛?: '澶磋',
    '蹇嶈€呯瓑绾?: '绛夌骇',
    '褰撳墠杩涘害': '杩涘害',
    '鏌ュ厠鎷夊睘鎬?: '鏌ュ厠鎷夊睘鎬?,
    '琛€缁ч檺鐣?: '琛€缁ч檺鐣?,
    '鍐欒疆鐪肩姸鎬?: '鍐欒疆鐪?,
    '浠欎汉妯″紡': '浠欎汉妯″紡',
    '閫氱伒鍏?: '閫氱伒鍏?,
    '绫诲瀷': '绫诲瀷',
    '鐔熺粌搴?: '鐔熺粌搴?,
    '鎶€鑳芥晥鏋?: '鏁堟灉',
    '娑堣€椾笌闄愬埗': '娑堣€?
  };

  var RED_CHAMBER_SECTIONS = ['鍩虹妗ｆ', '绉佸瘑澶栬', '璋冩暀涓庡紑鍙?, '绾磥搴︿笌缁忓巻', '鐢熻偛涓庢€€瀛?];

  var BODY_PARTS = [
    { key: '闈掍笣', label: '闈掍笣', desc: '鍙戜笣' },
    { key: '闆倢', label: '闆倢', desc: '鑲岃偆' },
    { key: '鐜夎噦', label: '鐜夎噦', desc: '鎵嬭噦' },
    { key: '棣欒偐', label: '棣欒偐', desc: '鑲╅儴' },
    { key: '閰ヨ兏', label: '閰ヨ兏', desc: '鑳搁儴' },
    { key: '鏌宠叞', label: '鏌宠叞', desc: '鑵伴儴' },
    { key: '淇暱缇庤吙', label: '缇庤吙', desc: '鑵块儴' },
    { key: '鐜夎冻', label: '鐜夎冻', desc: '瓒抽儴' }
  ];

  var currentData = null;

  /* ========== Helper: safe get ========== */
  function safeGet(obj, path, fallback) {
    if (typeof fallback === 'undefined') fallback = '';
    try {
      if (typeof _ !== 'undefined' && _.get) {
        return _.get(obj, path, fallback);
      }
      var parts = path.split('.');
      var cur = obj;
      for (var i = 0; i < parts.length; i++) {
        if (cur == null || typeof cur !== 'object') return fallback;
        cur = cur[parts[i]];
      }
      return (cur === undefined || cur === null) ? fallback : cur;
    } catch (e) {
      return fallback;
    }
  }

  /* ========== Helper: extract year from 鐏巻XX骞?========== */
  function extractYear(dateStr) {
    try {
      if (!dateStr) return null;
      var m = String(dateStr).match(/(\d+)/);
      return m ? parseInt(m[1], 10) : null;
    } catch (e) { return null; }
  }

  /* ========== Helper: calculate age ========== */
  function calcAge(currentTimeStr, birthdayStr) {
    try {
      var curYear = extractYear(currentTimeStr);
      var birthYear = extractYear(birthdayStr);
      if (curYear != null && birthYear != null) {
        return Math.max(0, curYear - birthYear);
      }
      return null;
    } catch (e) { return null; }
  }

  /* ========== Helper: get rank from level ========== */
  function getRank(level) {
    try {
      if (level == null) return '鏈煡';
      var lvl = typeof level === 'string' ? parseInt(level, 10) : level;
      return RANK_MAP[lvl] || '鏈煡';
    } catch (e) { return '鏈煡'; }
  }

  /* ========== Helper: affection color ========== */
  function getAffectionColor(value) {
    var v = Number(value);
    if (isNaN(v)) return '#9e9e9e';
    if (v < 0) return '#ff1744';
    if (v <= 30) return '#9e9e9e';
    if (v <= 50) return '#42a5f5';
    if (v <= 70) return '#26c6da';
    if (v <= 90) return '#ffa726';
    return '#ff4081';
  }

  function getAffectionLabel(value) {
    var v = Number(value);
    if (isNaN(v)) return '';
    if (v < 0) return '浠囨仺';
    if (v <= 30) return '鍐锋贰';
    if (v <= 50) return '涓€鑸?;
    if (v <= 70) return '鍙嬪ソ';
    if (v <= 90) return '淇¤禆';
    return '濮愬紵鎯呮繁';
  }

  /* ========== Helper: render sharingan ========== */
  function renderSharingan(state) {
    try {
      if (!state || state === '鏃?) return '<span style="color:#706860;font-size:0.75rem;">鏃?/span>';
      var s = String(state).trim();
      if (s.indexOf('鍗曞嬀鐜?) !== -1 || s === '鍗曞嬀鐜? || s === '1') {
        return '<span class="sharingan-display"><span class="sharingan-dot"></span></span>';
      }
      if (s.indexOf('鍙屽嬀鐜?) !== -1 || s === '鍙屽嬀鐜? || s === '2') {
        return '<span class="sharingan-display"><span class="sharingan-dot"></span><span class="sharingan-dot"></span></span>';
      }
      if (s.indexOf('涓夊嬀鐜?) !== -1 || s === '涓夊嬀鐜? || s === '3') {
        return '<span class="sharingan-triple"><span class="sd-dot"></span><span class="sd-dot"></span><span class="sd-dot"></span></span>';
      }
      if (s.indexOf('姘告亽涓囪姳绛?) !== -1) {
        return '<span class="sharingan-eternal">鉂€</span>';
      }
      if (s.indexOf('涓囪姳绛?) !== -1) {
        return '<span class="sharingan-mangekyo">鉂€</span>';
      }
      if (s.indexOf('杞洖鐪?) !== -1 || s.indexOf('杞洖') !== -1) {
        return '<span class="sharingan-rinnegan" style="color:#ce93d8;font-size:1.1rem;">鈼?/span>';
      }
      return '<span style="color:#706860;font-size:0.75rem;">' + escapeHtml(s) + '</span>';
    } catch (e) { return '<span style="color:#706860;">鈥?/span>'; }
  }

  /* ========== Helper: chakra element tag ========== */
  function renderChakraTag(element) {
    try {
      if (!element) return '';
      var parts = String(element).split(/[,锛屻€乚/).map(function(s) { return s.trim(); }).filter(Boolean);
      return parts.map(function(p) {
        var color = CHAKRA_COLORS[p] || '#888';
        return '<span class="chakra-tag" style="border-color:' + color + '44;color:' + color + ';">' + escapeHtml(p) + '</span>';
      }).join('');
    } catch (e) { return ''; }
  }

  /* ========== Helper: render affection display ========== */
  function renderAffection(value, labelOverride) {
    try {
      var v = Number(value);
      var color = getAffectionColor(v);
      var label = labelOverride || getAffectionLabel(v);
      var isGlow = v > 90;
      var cls = isGlow ? 'affection-display affection-glow' : 'affection-display';
      return '<span class="' + cls + '" style="color:' + color + ';">' +
        '<span class="affection-value">' + (isNaN(v) ? '鈥? : v + '/100') + '</span>' +
        '<span class="affection-label" style="border-color:' + color + '44;background:' + color + '11;">' + escapeHtml(label) + '</span>' +
        '</span>';
    } catch (e) { return '<span>鈥?/span>'; }
  }

  /* ========== Helper: escape HTML ========== */
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ========== Helper: friendly field label ========== */
  function friendlyLabel(key) {
    return FIELD_LABELS[key] || key;
  }

  /* ========== Helper: format key-value to display ========== */
  function kvToDisplay(obj, excludeKeys) {
    try {
      if (!obj || typeof obj !== 'object') return [];
      var ex = excludeKeys || [];
      return Object.keys(obj).filter(function(k) {
        return ex.indexOf(k) === -1;
      }).map(function(k) {
        return { key: k, label: friendlyLabel(k), value: obj[k] };
      });
    } catch (e) { return []; }
  }

  /* ========== Data Reading ========== */
  function readLatestStatData() {
    try {
      if (window.getVariables) {
        var cur = window.getVariables({ type: 'message' });
        if (cur && cur.stat_data) return cur.stat_data;
      }
    } catch (e) { /* ignore */ }
    try {
      if (window.Mvu && window.Mvu.getMvuData) {
        var latest = window.Mvu.getMvuData({ type: 'message', message_id: -1 });
        if (latest && latest.stat_data) return latest.stat_data;
      }
    } catch (e) { /* ignore */ }
    try {
      if (window.getAllVariables) {
        var all = window.getAllVariables();
        if (all && all.stat_data) return all.stat_data;
      }
    } catch (e) { /* ignore */ }
    return null;
  }

  /* ========== Main Render ========== */
  function handleDataUpdate() {
    try {
      var data = readLatestStatData();
      if (!data) {
        if (!currentData) return;
        return;
      }
      currentData = data;
      renderAll(data);
    } catch (e) {
      console.error('MVU Status: render error', e);
    }
  }

  function renderAll(data) {
    try {
      var loads = document.querySelectorAll('.loading-state');
      for (var i = 0; i < loads.length; i++) {
        loads[i].style.display = 'none';
      }
      var topContent = document.getElementById('top-content');
      if (topContent) topContent.style.display = 'block';
      renderTopBar(data);
      renderProfileTab(data);
      renderSisterTab(data);
      renderGalleryTab(data);
    } catch (e) {
      console.error('renderAll error', e);
    }
  }

  /* ========== Render: Top Bar ========== */
  function renderTopBar(data) {
    try {
      var world = data['涓栫晫'] || {};
      var timeStr = world['褰撳墠鏃堕棿'] || '鈥?;
      var loc = world['褰撳墠鍦扮偣'] || {};
      var env = world['鐜鎻忚堪'] || '';
      var script = world['褰撳墠鍓ф湰'] || '';
      var chapter = world['褰撳墠绔犺妭'] || '';
      var node = world['褰撳墠鑺傜偣'] || '';
      var sceneChars = world['褰撳墠鍦烘櫙鍐呰鑹?] || {};

      var locParts = [
        loc['澶у湴鐐?],
        loc['涓湴鐐?],
        loc['灏忓湴鐐?]
      ].filter(Boolean);
      var locStr = locParts.length ? locParts.join('<span class="loc-sep"> 路 </span>') : '鈥?;

      var locEl = document.getElementById('loc-display');
      if (locEl) locEl.innerHTML = locStr;

      var timeEl = document.getElementById('time-display');
      if (timeEl) timeEl.textContent = timeStr;

      var envEl = document.getElementById('env-desc');
      if (envEl) envEl.textContent = env || '鈥?;

      var tagsEl = document.getElementById('scene-tags');
      if (tagsEl) {
        var charNames = Object.keys(sceneChars).filter(function(n) { return sceneChars[n]; });
        if (charNames.length) {
          tagsEl.innerHTML = charNames.map(function(n) {
            return '<span class="scene-tag active">' + escapeHtml(n) + '</span>';
          }).join('');
        } else {
          tagsEl.innerHTML = '<span class="scene-tag">鏃犲湪鍦鸿鑹?/span>';
        }
      }

      var progEl = document.getElementById('story-progress');
      if (progEl) {
        var parts = [];
        if (script) parts.push('<span class="sp-label">鍓ф湰</span> <span class="sp-val">' + escapeHtml(script) + '</span>');
        if (chapter) parts.push('<span class="sp-label">绔犺妭</span> <span class="sp-val">' + escapeHtml(chapter) + '</span>');
        if (node) parts.push('<span class="sp-label">鑺傜偣</span> <span class="sp-val">' + escapeHtml(node) + '</span>');
        progEl.innerHTML = parts.join(' &nbsp;|&nbsp; ') || '鈥?;
      }
    } catch (e) {
      console.error('renderTopBar error', e);
    }
  }

  /* ========== Render: Tab 1 - Profile ========== */
  function renderProfileTab(data) {
    try {
      var container = document.getElementById('profile-content');
      if (!container) return;

      var player = data['鐜╁'] || {};
      var basic = player['鍩虹淇℃伅'] || {};
      var ninjaInfo = player['蹇嶈€呬俊鎭?] || {};
      var ninjutsu = player['蹇嶆湳鍒楄〃'] || {};
      var special = player['鐗规畩鎶€鑳?] || {};
      var backpack = player['鑳屽寘'] || {};
      var world = data['涓栫晫'] || {};
      var currentTime = world['褰撳墠鏃堕棿'] || '';

      var html = '';

      // Basic Info Grid
      var birth = basic['鐢熸棩'] || '';
      var age = calcAge(currentTime, birth);
      var ageStr = age != null ? age + '宀? : '鈥?;

      var basicFields = [
        { label: '濮撳悕', value: basic['濮撳悕'] },
        { label: '鎬у埆', value: basic['鎬у埆'] },
        { label: '骞撮緞', value: ageStr },
        { label: '韬珮', value: basic['韬珮'] },
        { label: '浣撻噸', value: basic['浣撻噸'] },
        { label: '韬唤', value: basic['韬唤'] }
      ];

      html += '<div class="section-title"><span class="st-icon">馃搵</span> 鍩虹淇℃伅</div>';
      html += '<div class="info-grid">';
      for (var i = 0; i < basicFields.length; i++) {
        var f = basicFields[i];
        html += '<div class="info-cell">' +
          '<div class="ic-label">' + escapeHtml(f.label) + '</div>' +
          '<div class="ic-value">' + escapeHtml(f.value || '鈥?) + '</div>' +
          '</div>';
      }
      html += '</div>';

      // Ninja Info Card
      var rank = safeGet(ninjaInfo, '蹇嶈€呭ご琛?, '');
      var level = safeGet(ninjaInfo, '蹇嶈€呯瓑绾?, '');
      var progress = safeGet(ninjaInfo, '褰撳墠杩涘害', '');
      var chakraAttr = safeGet(ninjaInfo, '鏌ュ厠鎷夊睘鎬?, '');
      var chakraAmount = safeGet(ninjaInfo, '鏌ュ厠鎷夐噺', '');
      var anchorTime = safeGet(ninjaInfo, '閿氬畾鏃堕棿', '');

      html += '<div class="section-title"><span class="st-icon">鈿旓笍</span> 蹇嶈€呬俊鎭?/div>';
      html += '<div class="ninja-info-card">';
      html += '<div class="nic-row"><span class="nic-label">澶磋</span><span class="nic-value">' + escapeHtml(rank) + ' <span class="rank-tag">Lv.' + escapeHtml(String(level)) + '</span></span></div>';
      html += '<div class="nic-row"><span class="nic-label">杩涘害</span><span class="nic-value">' + escapeHtml(String(progress)) + '%</span></div>';
      html += '<div class="progress-wrap"><div class="progress-fill" style="width:' + Math.min(100, Math.max(0, Number(progress) || 0)) + '%;"></div></div>';
      html += '<div class="nic-row"><span class="nic-label">鏌ュ厠鎷夊睘鎬?/span><span class="nic-value">' + renderChakraTag(chakraAttr) + '</span></div>';
      html += '<div class="nic-row"><span class="nic-label">鏌ュ厠鎷夐噺</span><span class="nic-value">' + escapeHtml(chakraAmount || '鈥?) + '</span></div>';
      if (anchorTime) html += '<div class="nic-row"><span class="nic-label">閿氬畾鏃堕棿</span><span class="nic-value" style="font-family:var(--font-mono);color:var(--blue-light);">' + escapeHtml(anchorTime) + '</span></div>';
      html += '</div>';

      // Ninjutsu
      if (Object.keys(ninjutsu).length) {
        html += '<div class="section-title"><span class="st-icon">馃敟</span> 蹇嶆湳鍒楄〃</div>';
        html += '<div class="card-grid cols-auto">';
        for (var nk in ninjutsu) {
          if (ninjutsu.hasOwnProperty(nk)) {
            var nv = ninjutsu[nk] || {};
            html += '<div class="skill-card clickable" onclick="openNinjutsuDetail(\'' + escapeHtml(nk).replace(/'/g, "\\'") + '\')">' +
              '<div class="sc-name">' + escapeHtml(nk) + '</div>' +
              '<div class="sc-type">' + escapeHtml(nv['绫诲瀷'] || '蹇嶆湳') + '</div>' +
              '<div class="sc-proficiency">' + escapeHtml(nv['鐔熺粌搴?] || '') + '</div>' +
              '</div>';
          }
        }
        html += '</div>';
      } else {
        html += '<div class="empty-state">鏆傛棤蹇嶆湳璁板綍</div>';
      }

  /* ========== Render: Tab 3 - Gallery ========== */
  function renderGalleryTab(data) {
    try {
      var container = document.getElementById('gallery-content');
      if (!container) return;

      var chars = data['瑙掕壊'] || {};
      var excludeNames = ['澶滈洩鍑?, '澶滃敖鏄?];
      var playerName = safeGet(data, '鐜╁.鍩虹淇℃伅.濮撳悕', '');
      if (playerName && excludeNames.indexOf(playerName) === -1) excludeNames.push(playerName);

      var npcList = [];
      var keys = Object.keys(chars);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var isExcluded = false;
        for (var e = 0; e < excludeNames.length; e++) {
          if (k.indexOf(excludeNames[e]) !== -1) { isExcluded = true; break; }
        }
        if (!isExcluded) {
          npcList.push({ name: k, data: chars[k] });
        }
      }

      if (npcList.length === 0 && keys.length > 0) {
        for (var i2 = 0; i2 < keys.length; i2++) {
          var k2 = keys[i2];
          if (k2.indexOf('澶滈洩鍑?) === -1 && k2.indexOf('澶滃敖鏄?) === -1) {
            npcList.push({ name: k2, data: chars[k2] });

      if (!npcList.length) {
        container.innerHTML = '<div class="empty-state">鏆傛棤鍏朵粬瑙掕壊鏁版嵁</div>';
        return;

  /* ========== Tab Switching ========== */
  function switchTab(tabId) {
    try {
      var btns = document.querySelectorAll('.tab-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.remove('active');
      }
      var activeBtn = document.querySelector('.tab-btn[data-tab="' + tabId + '"]');
      if (activeBtn) activeBtn.classList.add('active');

      var contents = document.querySelectorAll('.tab-content');
      for (var j = 0; j < contents.length; j++) {
        contents[j].classList.remove('active');
      }
      var target = document.getElementById('tab-' + tabId);
      if (target) target.classList.add('active');
    } catch (e) {
      console.error('switchTab error', e);
    }
  }

  /* ========== Modal System ========== */
  function openModal(title, bodyHtml) {
    try {
      var overlay = document.getElementById('modal-overlay');
      var titleEl = document.getElementById('modal-title');
      var bodyEl = document.getElementById('modal-body');
      if (!overlay || !titleEl || !bodyEl) return;
      titleEl.textContent = title || '璇︽儏';
      bodyEl.innerHTML = bodyHtml || '';
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    } catch (e) {
      console.error('openModal error', e);
    }
  }

  function closeModal() {
    try {
      var overlay = document.getElementById('modal-overlay');
      if (overlay) overlay.classList.remove('open');
      document.body.style.overflow = '';
    } catch (e) { /* ignore */ }
  }
