    if (!v) return null;

  function readStatData() {
    try {
      const cur = window.getVariables?.({ type: "message" });
      const d = extractStatData(cur);
      if (d && d.祁远宁) return d;
    } catch (e) {
      console.error("[小手机] getVariables", e);
    }
    try {
      const mv = window.Mvu;
      if (mv?.getMvuData) {
        const d2 = extractStatData(mv.getMvuData({ type: "message", message_id: -1 }));
        if (d2 && d2.祁远宁) return d2;
      }
    } catch (e) {
      console.error("[小手机] getMvuData", e);
    }
    try {
      const all = window.getAllVariables?.();
      const d3 = extractStatData(all);
      if (d3 && d3.祁远宁) return d3;
    } catch (e) {
      console.error("[小手机] getAllVariables", e);
    }
    return null;
  }

  }
  function renderMusic(phone) {
    const list = phone.听歌记录 || [];
    if (!list.length) return empty("暂无听歌记录");
    let html = '<div class="list">';
    list.forEach((s) => {
      html += `<div class="item" style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center">🎵</div>
      <div style="flex:1"><div style="font-weight:600">${esc(s.歌名 || "")}</div><div style="font-size:11px;color:var(--txt-d)">${esc(s.歌手 || "")}</div></div>
    </div>`;
    });
    return html + "</div>";
  }
  function renderBrowser(phone) {
    const list = phone.浏览记录 || [];
    if (!list.length) return empty("暂无浏览记录");
    let html = '<div class="list">';
    list.forEach((u) => {
      html += `<div class="item" style="font-size:12px;color:var(--blue)">${esc(u)}</div>`;
    });
    return html + "</div>";
  }
  function renderSearch(phone) {
    const list = phone.搜索记录 || [];
    if (!list.length) return empty("暂无搜索记录");
    let html = '<div class="list">';
    list.forEach((s) => {
      html += `<div class="item" style="display:flex;gap:8px;align-items:center"><span style="color:var(--txt-d)">🔍</span><span>${esc(s)}</span></div>`;
    });
    return html + "</div>";
  }
  function renderTakeout(phone) {
    const list = phone.外卖订单 || [];
    if (!list.length) return empty("暂无外卖订单");
    let html = '<div class="list">';
    list.forEach((o) => {
      html += `<div class="item"><div style="font-weight:600">${esc(o.内容 || "")}</div><div style="display:flex;justify-content:space-between;margin-top:4px"><span class="p-time">${esc(o.时间 || "")}</span><span style="color:var(--gold)">¥${esc(o.金额 || "")}</span></div></div>`;
    });
    return html + "</div>";
  }
  function renderWeather(phone) {
    const w = phone.天气 || "—";
    return `<div style="padding:40px 20px;text-align:center">
    <div style="font-size:60px;margin-bottom:10px">⛅</div>
    <div style="font-size:16px;color:var(--gold);margin-bottom:6px">${esc(w)}</div>
    <div style="font-size:12px;color:var(--txt-d)">祁远宁当前位置天气</div>
  </div>`;
  }
  function renderSettings(d) {
    return `<div class="list">
    <div class="item" data-go="profile" style="cursor:pointer;display:flex;align-items:center;gap:10px">
      <div class="avatar" style="background:var(--gold);color:#000">祁</div>
      <div><div style="font-weight:700">祁远宁</div><div style="font-size:11px;color:var(--txt-d)">查看状态详情 ›</div></div>
    </div>
    <div class="item" data-go="npc" style="cursor:pointer;display:flex;align-items:center;gap:10px">
      <div class="avatar" style="background:var(--rose)">👥</div>
      <div><div style="font-weight:700">NPC心声</div><div style="font-size:11px;color:var(--txt-d)">陆永琛·周岳山·祁之等 ›</div></div>
    </div>
    <div class="item" style="text-align:center;color:var(--txt-dd);font-size:11px">祁远宁的 iPhone · MVU驱动 · v1.0</div>
  </div>`;
  }
  function bindSettings(d) {
    document.querySelectorAll(".item[data-go]").forEach((it) => {
      it.addEventListener("click", () => {
        const go = it.dataset.go;
        renderModule(go, d);
      });
    });
  }
  function renderProfile(d) {
    const q = d.祁远宁 || {};
    const info = q.基础信息 || {};
    const st = q.当前状态 || {};
    const body = q.身体状态 || {};
    const rel = q.与用户关系 || {};
    return `<div class="list">
    <div class="post">
      <div class="p-head"><div class="avatar" style="background:var(--gold);color:#000">祁</div><div><div class="p-name">祁远宁</div><div class="p-time">${esc(f(info.身份))} · ${f(info.年龄)}岁</div></div></div>
      <div class="p-body">${esc(f(info.当前目标))}</div>
    </div>
    <div class="widget"><div class="w-title">当前状态</div>
      <div style="margin-bottom:4px">${esc(f(st.心情))}</div>
      <div style="font-size:12px;margin-bottom:4px"><b>衣着:</b> ${esc(f(st.衣着))}</div>
      <div style="font-size:12px;margin-bottom:4px"><b>动作:</b> ${esc(f(st.动作))}</div>
      <div style="font-size:12px;margin-bottom:4px"><b>内心:</b> ${esc(f(st.内心想法))}</div>
      <div style="font-size:12px"><b>日记:</b> ${esc(f(st.日记))}</div>
    </div>
    <div class="widget"><div class="w-title">身体状态</div>
      <div>体力 ${f(body.体力, 0)}%<div class="bar"><i style="width:${clamp(body.体力, 0, 100)}%;background:var(--green)"></i></div></div>
      <div style="margin-top:6px">醉酒度 ${f(body.醉酒度, 0)}%<div class="bar"><i style="width:${clamp(body.醉酒度, 0, 100)}%;background:#e8a0b8"></i></div></div>
      <div style="margin-top:6px;font-size:12px"><b>饮食需求:</b> ${esc(f(body.饮食需求))}</div>
    </div>
    <div class="widget"><div class="w-title">与用户关系</div>
      <div class="relation-card">
        <div class="rc"><div class="v" style="color:var(--rose)">${f(rel.好感度, 0)}</div><div class="l">好感度</div></div>
        <div class="rc"><div class="v">${f(rel.占有欲, 0)}</div><div class="l">占有欲</div></div>
        <div class="rc"><div class="v" style="color:var(--green)">${f(rel.信任度, 0)}</div><div class="l">信任度</div></div>
        <div class="rc"><div class="v" style="color:var(--blue);font-size:12px">${esc(f(rel.当前阶段))}</div><div class="l">阶段</div></div>
      </div>
    </div>
  </div>`;
  }
  function renderNPC(d) {
    const npcs = d.NPC || {};
    const names = Object.keys(npcs);
    if (!names.length) return empty("暂无NPC数据");
    let html = '<div class="list">';
    names.forEach((n) => {
      const c = npcs[n] || {};
      html += `<div class="npc-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="n-name">${esc(n)}</div>
        <div style="font-size:10px;color:var(--txt-d)">${esc(f(c.关系))}</div>
      </div>
      <div style="font-size:11px;color:var(--txt-dd);margin-top:2px">${esc(f(c.身份))}</div>
      <div class="n-mind">${esc(f(c.心声))}</div>
      <div style="font-size:11px;color:var(--txt-d);margin-top:5px"><b>状态:</b> ${esc(f(c.当前状态))}</div>
      <div style="font-size:11px;margin-top:3px"><b style="color:var(--rose)">对用户好感:</b> ${f(c.与用户好感, 0)}</div>
    </div>`;
    });
    return html + "</div>";
  }
  function empty(msg) {
    return `<div class="empty">${esc(msg)}</div>`;
  }
  function clamp(v, a, b) {
    return Math.max(a, Math.min(b, Number(v) || 0));
  }
  function avatarColor(name) {
    const colors = ["#7aa2d9", "#8fbf9f", "#e8a0b8", "#c9a96e", "#8b6fae", "#ff7e3f", "#5a9fd4", "#e6162d"];
    let h = 0;
    for (const c of name || "") h = h * 31 + c.charCodeAt(0) & 65535;
    return colors[h % colors.length];
  }
  function shade(hex) {
    return hex;
  }

  // src/main.ts
  var currentData = null;
  function refresh() {
    const d = readStatData();
    if (!d || !d.祁远宁) return;
    currentData = d;
    const active = getActiveModule();
    if (active === "home" || !active) {
      renderHome(d);
    } else {
      renderModule(active, d);
    }
  }
  function init() {
    renderShell();
    refresh();
    subscribeUpdate(refresh);
    setInterval(refresh, 2e3);
    console.log("[祁远宁小手机] 初始化完成");
  }
  window.__qynPhoneRefresh = refresh;
  window.__qynPhoneInit = init;
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

</script>
</body>
</body>
</html>
